<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Parlour — pass-and-play games for the family table</title>
<meta name="description" content="A calm cupboard of classic games for the whole family. Pass-and-play on one device, or play the computer. Local-first, offline, no accounts, no ads.">
<meta name="theme-color" content="#2f5d50">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --felt:#2f5d50; --felt-deep:#234a3f; --felt-line:#3c6f60;
    --paper:#f4efe3; --paper-edge:#e6dcc6; --ink:#26201a; --muted:#6f6453;
    --wood:#7a4e2e; --brass:#c9a24b; --brass-deep:#a8842f;
    --x:#b8502f; --o:#2f6f8f;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink); min-height:100dvh;
    background:
      radial-gradient(120% 80% at 50% -10%, #366c5d 0%, var(--felt) 45%, var(--felt-deep) 100%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:max(18px,env(safe-area-inset-top)) 18px 40px}

  /* ---- Header ---- */
  header.top{text-align:center;color:var(--paper);padding:26px 8px 22px}
  .brand{font-family:var(--serif);font-weight:600;font-size:clamp(2.4rem,7vw,3.4rem);
    letter-spacing:-.01em;margin:0;line-height:1}
  .brand .dot{color:var(--brass)}
  .tag{margin:.5rem 0 0;opacity:.86;font-size:clamp(.92rem,2.6vw,1.05rem)}
  .rule{width:64px;height:3px;border-radius:3px;background:var(--brass);margin:16px auto 0;opacity:.85}

  /* ---- Cupboard grid ---- */
  .cupboard{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-top:8px}
  .tile{
    appearance:none;text-align:left;cursor:pointer;color:var(--ink);
    background:linear-gradient(180deg,var(--paper) 0%,var(--paper-edge) 100%);
    border:1px solid #00000018;border-radius:14px;padding:15px 15px 13px;
    box-shadow:0 1px 0 #ffffff90 inset, 0 6px 16px #00000035;
    display:flex;flex-direction:column;gap:8px;min-height:128px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .tile:hover{transform:translateY(-3px);box-shadow:0 1px 0 #ffffff90 inset,0 12px 24px #00000045}
  .tile:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .tile .glyph{font-size:1.9rem;line-height:1}
  .tile h3{font-family:var(--serif);font-size:1.18rem;margin:0;font-weight:600;letter-spacing:-.01em}
  .tile p{margin:0;color:var(--muted);font-size:.82rem;flex:1}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .badge{font-size:.66rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--wood);background:#7a4e2e1a;border-radius:999px;padding:3px 8px}
  .badge.le{color:var(--brass-deep);background:#c9a24b22}

  /* ---- Stage (a single game) ---- */
  .stage{display:none;color:var(--paper)}
  .stage.on{display:block}
  body.playing .cupboard,body.playing header.top,body.playing .shelf-foot{display:none}
  .gbar{display:flex;align-items:center;gap:12px;margin:6px 0 18px}
  .back{appearance:none;cursor:pointer;font:inherit;font-weight:600;color:var(--paper);
    background:#ffffff1f;border:1px solid #ffffff33;border-radius:999px;padding:9px 15px}
  .back:hover{background:#ffffff30}
  .back:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .gtitle{font-family:var(--serif);font-size:1.5rem;margin:0;font-weight:600}
  .panel{background:linear-gradient(180deg,var(--paper),var(--paper-edge));color:var(--ink);
    border-radius:18px;padding:20px;box-shadow:0 10px 30px #00000045;max-width:560px;margin:0 auto}
  .status{text-align:center;font-size:1.1rem;font-weight:600;min-height:1.5em;margin:0 0 14px}
  .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .btn{appearance:none;cursor:pointer;font:inherit;font-weight:600;border-radius:999px;padding:10px 18px;
    border:1px solid #00000022;background:var(--felt);color:var(--paper)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn[aria-pressed=true]{background:var(--brass);color:var(--ink);border-color:transparent}
  .btn:focus-visible{outline:3px solid var(--brass);outline-offset:2px}

  /* ---- Tic-tac-toe board ---- */
  .ttt{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:330px;margin:0 auto;aspect-ratio:1}
  .ttt button{appearance:none;cursor:pointer;border:none;border-radius:12px;
    background:#2f5d500f;font-family:var(--serif);font-weight:700;font-size:clamp(2rem,11vw,3rem);
    display:grid;place-items:center;aspect-ratio:1}
  .ttt button:disabled{cursor:default}
  .ttt button:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .ttt .X{color:var(--x)} .ttt .O{color:var(--o)}
  .ttt button.win{background:var(--brass);}

  /* ---- Connect Four board ---- */
  .c4{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:420px;margin:0 auto;
    background:var(--felt);padding:9px;border-radius:14px}
  .c4 .c4cell{appearance:none;cursor:pointer;border:none;aspect-ratio:1;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #ffffff22, #00000022), #f4efe3;}
  .c4 .c4cell.R{background:radial-gradient(circle at 38% 32%, #ffffff55, #00000022), var(--x)}
  .c4 .c4cell.Y{background:radial-gradient(circle at 38% 32%, #ffffff66, #00000022), var(--brass)}
  .c4 .c4cell:disabled{cursor:default}
  .c4 .c4cell.win{box-shadow:0 0 0 3px var(--ink) inset}
  .c4 .c4cell:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

  /* ---- 2048 ---- */
  .g2048{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:360px;margin:0 auto;
    background:var(--felt);padding:8px;border-radius:12px;touch-action:none;user-select:none}
  .g2048 .t{aspect-ratio:1;border-radius:8px;display:grid;place-items:center;
    font-family:var(--serif);font-weight:700;font-size:clamp(1rem,5vw,1.7rem);
    background:#ffffff14;color:var(--ink)}
  .g2048 .t.v2{background:#eee4da}.g2048 .t.v4{background:#ede0c8}
  .g2048 .t.v8{background:#f2b179;color:#fff}.g2048 .t.v16{background:#f59563;color:#fff}
  .g2048 .t.v32{background:#f67c5f;color:#fff}.g2048 .t.v64{background:#f65e3b;color:#fff}
  .g2048 .t.v128,.g2048 .t.v256,.g2048 .t.v512{background:#edcf72;color:#fff;font-size:clamp(.9rem,4.2vw,1.4rem)}
  .g2048 .t.v1024,.g2048 .t.v2048{background:#edc22e;color:#fff;font-size:clamp(.8rem,4vw,1.3rem)}
  .pad{display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(2,46px);gap:6px;justify-content:center}
  .pad button{appearance:none;border:1px solid #00000022;background:var(--paper-edge);border-radius:10px;font-size:1.2rem;cursor:pointer}
  .pad .up{grid-column:2;grid-row:1}.pad .left{grid-column:1;grid-row:2}
  .pad .down{grid-column:2;grid-row:2}.pad .right{grid-column:3;grid-row:2}
  .score{text-align:center;font-weight:600;margin-bottom:10px}

  /* ---- Memory ---- */
  .mem{display:grid;gap:8px;max-width:400px;margin:0 auto}
  .mem .card{aspect-ratio:1;border:none;border-radius:10px;cursor:pointer;
    font-size:clamp(1.3rem,7vw,2rem);display:grid;place-items:center;
    background:var(--felt);color:transparent}
  .mem .card.up{background:#f4efe3;color:initial}
  .mem .card.done{background:#cfe3d8;color:initial;cursor:default}
  .mem .card:focus-visible{outline:3px solid var(--brass);outline-offset:2px}

  /* ---- Hexcodle ---- */
  .hex{max-width:380px;margin:0 auto;text-align:center}
  .hex .row{display:flex;gap:6px;justify-content:center;margin:7px 0}
  .hex .cell{width:40px;height:46px;border-radius:8px;display:grid;place-items:center;
    font-family:var(--serif);font-weight:700;font-size:1.1rem;background:#00000010;line-height:1}
  .hex .cell small{display:block;font-size:.62rem;font-weight:700}
  .hex .cell.ok{background:#8bbd9a;color:#15301f}
  .hex .cell.hi{background:#e3b9a8;color:#5b2418}
  .hex .cell.lo{background:#a8c4e3;color:#173a5b}
  .hex input{font:inherit;font-family:var(--serif);font-size:1.15rem;letter-spacing:.22em;
    text-transform:lowercase;width:180px;text-align:center;padding:9px;border-radius:8px;border:1px solid #00000022}
  .hex .swatch{height:46px;border-radius:10px;margin:10px auto;border:1px solid #00000022}

  .shelf-foot{color:#ffffffcc;text-align:center;margin-top:32px;font-size:.8rem;line-height:1.7}
  .shelf-foot a{color:var(--paper)}
  /* ---- Reversi / Othello ---- */
  .reversi{max-width:440px;margin:0 auto}
  .reversi .board{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;
    background:var(--felt);padding:8px;border-radius:12px}
  .reversi .cell{appearance:none;cursor:pointer;border:none;padding:0;aspect-ratio:1;
    border-radius:8px;background:#ffffff12;display:grid;place-items:center}
  .reversi .cell:disabled{cursor:default}
  .reversi .cell.hint{background:#c9a24b22}
  .reversi .cell.hint::after{content:"";width:32%;height:32%;border-radius:50%;
    background:var(--brass);opacity:.7}
  .reversi .cell:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .reversi .disc{width:80%;height:80%;border-radius:50%}
  .reversi .disc.B{background:radial-gradient(circle at 36% 30%,#62584e,#15100c);
    box-shadow:0 1px 2px #00000070, inset 0 1px 1px #ffffff22}
  .reversi .disc.W{background:radial-gradient(circle at 36% 30%,#ffffff,#dcd3c0);
    box-shadow:0 1px 2px #00000055, inset 0 1px 1px #ffffff}
  /* ---- Nim ---- */
.nim{display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;
  background:var(--felt);padding:18px 16px;border-radius:16px}
.nim-row{display:flex;align-items:center;gap:12px;min-height:46px}
.nim-rowlabel{flex:0 0 54px;color:var(--paper);opacity:.72;font-size:.72rem;
  font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.nim-track{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.nim-token{appearance:none;cursor:pointer;border:none;width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 38% 30%, #fbe7b0, var(--brass) 58%, #a8842f);
  box-shadow:0 2px 4px #00000045, 0 0 0 1px #00000022 inset;
  transition:transform .1s ease, box-shadow .1s ease}
.nim-token:not(:disabled):hover,
.nim-token:not(:disabled):hover ~ .nim-token{
  transform:translateY(-4px);
  box-shadow:0 6px 12px #00000055, 0 0 0 2px var(--ink) inset}
.nim-token:disabled{cursor:default}
.nim-token:focus-visible{outline:3px solid var(--paper);outline-offset:2px}
.nim-empty{color:var(--paper);opacity:.4;font-size:1.05rem;padding-left:2px;letter-spacing:.04em}
  /* ---- Hangman ---- */
  .hangman{display:flex;flex-direction:column;align-items:center;gap:14px}
  .hangman .hm-figure{display:flex;justify-content:center}
  .hangman .hm-svg{width:140px;height:auto;stroke:var(--felt);stroke-width:3.2;
    stroke-linecap:round;stroke-linejoin:round;fill:none}
  .hangman .hm-svg .b{stroke:var(--x)}
  .hangman .hm-word{font-family:var(--serif);font-weight:700;color:var(--ink);
    font-size:clamp(1.5rem,8vw,2.3rem);letter-spacing:.14em;text-align:center;
    min-height:1.4em;word-break:break-word}
  .hangman .hm-meter{font-weight:600;color:var(--muted);font-size:.92rem;text-align:center}
  .hangman .hm-meter b{color:var(--x);letter-spacing:.08em;text-transform:uppercase}
  .hangman .hm-keys{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;
    max-width:340px;width:100%}
  .hangman .hm-key{appearance:none;cursor:pointer;border:1px solid #00000018;border-radius:9px;
    background:linear-gradient(180deg,var(--paper) 0%,var(--paper-edge) 100%);color:var(--ink);
    font-family:var(--serif);font-weight:700;font-size:1.05rem;aspect-ratio:1;line-height:1;
    display:grid;place-items:center;box-shadow:0 1px 0 #ffffff90 inset,0 2px 5px #00000022;
    transition:transform .1s ease}
  .hangman .hm-key:hover:not(:disabled){transform:translateY(-1px)}
  .hangman .hm-key:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .hangman .hm-key:disabled{cursor:default;box-shadow:none}
  .hangman .hm-key.hit{background:var(--o);color:var(--paper);border-color:transparent}
  .hangman .hm-key.miss{background:var(--x);color:var(--paper);border-color:transparent;opacity:.55}
  /* ---- Hex (the connection game) — root .hex2 to avoid the Hexcodle .hex clash ---- */
.hex2{max-width:360px;margin:0 auto;text-align:center;overflow-x:auto}
.hex2 .board{display:inline-block;padding:6px 6px 8px;min-width:max-content}
.hex2 .hr{display:flex;gap:2px;margin-bottom:2px}
.hex2 .cell{width:20px;height:20px;flex:0 0 20px;padding:0;border-radius:5px;
  border:1px solid #00000026;background:#2f5d5012;cursor:pointer;appearance:none;
  transition:background .12s ease}
.hex2 .cell:hover:not(:disabled){background:#2f5d5026}
.hex2 .cell.R{background:var(--x);border-color:#00000033}
.hex2 .cell.B{background:var(--o);border-color:#00000033}
.hex2 .cell:disabled{cursor:default}
.hex2 .cell:focus-visible{outline:2px solid var(--brass);outline-offset:1px}
.hex2 .cell.et{border-top:3px solid var(--x)}
.hex2 .cell.eb{border-bottom:3px solid var(--x)}
.hex2 .cell.el{border-left:3px solid var(--o)}
.hex2 .cell.er{border-right:3px solid var(--o)}
.hex2 .legend{display:flex;gap:16px;justify-content:center;margin:12px 0 2px;font-size:.74rem;color:var(--muted)}
.hex2 .legend .r{color:var(--x)}
.hex2 .legend .b{color:var(--o)}
  .mines{max-width:380px;margin:0 auto;text-align:center}
.mines .board{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;max-width:360px;
  margin:0 auto;background:var(--felt);padding:8px;border-radius:12px;touch-action:manipulation;user-select:none}
.mines .cell{appearance:none;cursor:pointer;border:none;padding:0;aspect-ratio:1;border-radius:6px;
  background:var(--paper-edge);color:var(--ink);display:grid;place-items:center;line-height:1;
  font-family:var(--serif);font-weight:700;font-size:clamp(.8rem,4vw,1.2rem);
  box-shadow:inset 0 1px 0 #ffffff80,inset 0 -2px 0 #00000014}
.mines .cell:hover:not(:disabled):not(.open){background:#efe7d4}
.mines .cell:focus-visible{outline:3px solid var(--brass);outline-offset:1px;z-index:1}
.mines .cell:disabled{cursor:default}
.mines .cell.open{background:var(--paper);box-shadow:inset 0 0 0 1px #00000014}
.mines .cell.flag{background:#ece0c5}
.mines .cell.mine{background:var(--x);color:var(--paper);box-shadow:none}
.mines .cell.n1{color:var(--o)} .mines .cell.n2{color:#2f7a4a}
.mines .cell.n3{color:var(--x)} .mines .cell.n4{color:#3b3b8a}
.mines .cell.n5{color:#8a3b24} .mines .cell.n6{color:#2f8f8f}
.mines .cell.n7{color:var(--ink)} .mines .cell.n8{color:var(--muted)}
  /* ---- Mastermind (solo code-breaker) — root .mm ---- */
  .mm{display:flex;flex-direction:column;align-items:center;gap:16px;
    --mm-r:#cf4d54;--mm-o:#df8a3b;--mm-y:#e6bd3e;--mm-g:#4f9d6b;--mm-b:#3f80ac;--mm-p:#8d6fb3}
  .mm .mm-board{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px}
  .mm .mm-row{display:flex;align-items:center;gap:12px;
    background:#ffffff5c;border:1px solid #00000014;border-radius:13px;padding:7px 11px}
  .mm .mm-row.active{background:#2f5d500f;border-style:dashed;border-color:#2f5d5040}
  .mm .mm-num{flex:0 0 16px;text-align:center;font-weight:700;color:var(--muted);font-size:.78rem}
  .mm .mm-pegs{display:flex;gap:9px;flex:1}
  .mm .mm-peg{width:30px;height:30px;flex:0 0 30px;border-radius:50%;padding:0;border:none;
    box-shadow:0 1px 0 #ffffff80 inset,0 2px 4px #00000026}
  .mm button.mm-peg{cursor:pointer}
  .mm .mm-peg.slot{background:#0000000d;box-sizing:border-box;border:1px dashed #00000026;
    box-shadow:inset 0 1px 3px #0000001a}
  .mm .c-r{background:radial-gradient(circle at 34% 30%,#ffffff70,transparent 58%),var(--mm-r)}
  .mm .c-o{background:radial-gradient(circle at 34% 30%,#ffffff70,transparent 58%),var(--mm-o)}
  .mm .c-y{background:radial-gradient(circle at 34% 30%,#ffffff70,transparent 58%),var(--mm-y)}
  .mm .c-g{background:radial-gradient(circle at 34% 30%,#ffffff70,transparent 58%),var(--mm-g)}
  .mm .c-b{background:radial-gradient(circle at 34% 30%,#ffffff70,transparent 58%),var(--mm-b)}
  .mm .c-p{background:radial-gradient(circle at 34% 30%,#ffffff70,transparent 58%),var(--mm-p)}
  .mm .mm-feedback{flex:0 0 auto;display:grid;grid-template-columns:repeat(2,9px);
    grid-auto-rows:9px;gap:4px;padding:2px}
  .mm .mm-fb{width:9px;height:9px;border-radius:50%;box-sizing:border-box}
  .mm .mm-fb.black{background:var(--ink);box-shadow:0 0 0 1px #0000001a}
  .mm .mm-fb.white{background:var(--paper);border:1px solid #00000059}
  .mm .mm-fb.none{background:#00000010;border:1px solid #0000000d}
  .mm .mm-reveal{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
  .mm .mm-revlabel{font-weight:600;color:var(--muted);font-size:.9rem}
  .mm .mm-palette{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .mm .mm-swatch{width:40px;height:40px;border-radius:50%;padding:0;border:none;cursor:pointer;
    box-shadow:0 1px 0 #ffffff80 inset,0 3px 6px #00000033;transition:transform .1s ease}
  .mm .mm-swatch:hover{transform:translateY(-2px)}
  .mm .mm-swatch:focus-visible,.mm button.mm-peg:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .mm .mm-actions{display:flex;gap:10px}
  .mm .mm-act{appearance:none;cursor:pointer;font:inherit;font-weight:600;border-radius:999px;
    padding:9px 18px;border:1px solid #00000022;background:var(--paper-edge);color:var(--ink)}
  .mm .mm-act.primary{background:var(--felt);color:var(--paper);border-color:transparent}
  .mm .mm-act:disabled{opacity:.4;cursor:default}
  .mm .mm-act:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  /* ---- Wordle ---- */
  .wordle{--felt:#2f5d50;--paper:#f4efe3;--paper-edge:#e6dcc6;--brass:#c9a24b;--ink:#26201a;
    max-width:360px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:18px}
  .wordle .wgrid{display:flex;flex-direction:column;gap:6px}
  .wordle .wrow{display:flex;gap:6px;justify-content:center}
  .wordle .wcell{width:52px;height:52px;display:grid;place-items:center;background:var(--paper);
    border:2px solid var(--paper-edge);border-radius:7px;color:var(--ink);text-transform:uppercase;
    font-family:var(--serif);font-weight:700;font-size:1.7rem;line-height:1;transition:transform .08s ease}
  .wordle .wcell.typed{border-color:#b6aa8f}
  .wordle .wcell.correct{background:#6aaa64;border-color:#6aaa64;color:#fff}
  .wordle .wcell.present{background:var(--brass);border-color:var(--brass);color:#fff}
  .wordle .wcell.absent{background:#7d756a;border-color:#7d756a;color:#fff}
  .wordle .wkeys{display:flex;flex-direction:column;gap:6px;width:100%}
  .wordle .wkrow{display:flex;gap:5px;justify-content:center}
  .wordle .wkey{appearance:none;cursor:pointer;font:inherit;font-weight:700;font-size:.95rem;color:var(--ink);
    background:#d8cfbb;border:none;border-radius:6px;height:50px;flex:1;min-width:0;padding:0;
    display:grid;place-items:center;text-transform:uppercase}
  .wordle .wkey.wide{flex:1.5;font-size:.72rem}
  .wordle .wkey:active{transform:translateY(1px)}
  .wordle .wkey:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .wordle .wkey.correct{background:#6aaa64;color:#fff}
  .wordle .wkey.present{background:var(--brass);color:#fff}
  .wordle .wkey.absent{background:#7d756a;color:#fff}
  .c8{--felt:#2f5d50;--paper:#f4efe3;--paper-edge:#e6dcc6;--brass:#c9a24b;--ink:#26201a;--x:#b8502f;--o:#2f6f8f;

function canPlay(card, topCard, activeSuit) {

function legalPlays(hand, topCard, activeSuit) {
  return hand.filter((c) => canPlay(c, topCard, activeSuit));

// ~150 further valid guess words. Combined with ANSWERS these form the set of
// words a player is permitted to enter.
const EXTRA = [
  'dense', 'depth', 'dirty', 'dodge', 'doubt', 'dozen', 'draft', 'drain', 'drama', 'drawn',
  'dream', 'dress', 'dried', 'drift', 'drill', 'drink', 'drive', 'drove', 'dwarf', 'eager',

  'faint', 'fairy', 'faith', 'false', 'fancy', 'fatal', 'fault', 'favor', 'feast', 'fence',
  'ferry', 'fetch', 'fever', 'fiber', 'field', 'fiery', 'fifth', 'fifty', 'fight', 'filed',
  'final', 'finch', 'finer', 'first', 'fixed', 'flair', 'flame', 'flash', 'flask', 'fleet',
  'flesh', 'float', 'flock', 'flood', 'floor', 'flora', 'flour', 'flown', 'fluid', 'flush',
  'focus', 'force', 'forge', 'forth', 'forty', 'forum', 'found', 'frame', 'frank', 'fraud',
  'fresh', 'front', 'frost', 'frown', 'fruit', 'fully', 'funny', 'gauge', 'geese', 'ghost',
  'giant', 'given', 'glass', 'gleam', 'glide', 'globe', 'gloom', 'glory', 'glove', 'grace',
  'grade', 'grain', 'grand', 'grant', 'grape', 'graph', 'grasp', 'grass', 'grave', 'great',
  'greed', 'green', 'greet', 'grief', 'grill', 'grind', 'groom', 'gross', 'group', 'grove',
  'grown', 'guard', 'guess', 'guest', 'guide', 'guilt', 'habit', 'hairy', 'handy', 'happy',
];
const ALLOWED = new Set([...ANSWERS, ...EXTRA]);

/// Deterministic puzzle for an integer seed (e.g. YYYYMMDD): the same seed
/// always yields the same answer, with no server and no stored state. Mixes the
/// seed's bits so consecutive days land on unrelated words.
function dailyAnswer(seed) {
  let a = (seed >>> 0) || 1;
  a = Math.imul(a ^ (a >>> 16), 0x45d9f3b);
  a = Math.imul(a ^ (a >>> 16), 0x45d9f3b);
  a = (a ^ (a >>> 16)) >>> 0;
  return ANSWERS[a % ANSWERS.length];
}

/// True when `word` is a permitted guess (case-insensitive).
function isAllowed(word) {
  return ALLOWED.has(String(word).toLowerCase());
}

/// Grade `guess` against `answer`, returning five verdicts of
/// 'correct' | 'present' | 'absent' by standard Wordle rules: exact matches are
/// claimed first, then each remaining guess letter is 'present' only while an
/// unclaimed answer letter of that kind is still available (so a duplicate
/// guessed letter goes 'absent' once the answer's copies are exhausted).
function score(guess, answer) {
  const g = String(guess).toLowerCase();
  const a = String(answer).toLowerCase();
  const out = new Array(WORD_LEN).fill('absent');
  const remaining = {};
  for (let i = 0; i < WORD_LEN; i++) {
    remaining[a[i]] = (remaining[a[i]] || 0) + 1;
  }
  // First pass: exact, in-place matches consume an answer letter each.
  for (let i = 0; i < WORD_LEN; i++) {
    if (g[i] === a[i]) {
      out[i] = 'correct';
      remaining[g[i]]--;
    }
  }
  // Second pass: 'present' only while unclaimed copies of that letter remain.
  for (let i = 0; i < WORD_LEN; i++) {
    if (out[i] === 'correct') continue;
    if (remaining[g[i]] > 0) {
      out[i] = 'present';
      remaining[g[i]]--;
    }
  }
  return out;
}

return { WORD_LEN, MAX_GUESSES, ANSWERS, ALLOWED, dailyAnswer, isAllowed, score };
})();

// ---- Cupboard + router ----
const cupboardEl = document.getElementById('cupboard');
const stageEl = document.getElementById('stage');

function renderCupboard(){
  cupboardEl.innerHTML='';
  for(const g of GAMES){
    const t=document.createElement('button');
    t.className='tile'; t.type='button';
    t.innerHTML =
      `<div class="glyph" aria-hidden="true">${g.glyph}</div>`+
      `<h3>${g.name}</h3><p>${g.blurb}</p>`+
      `<div class="badges">${g.badges.map(b=>`<span class="badge${/le$/.test(g.id)?' le':''}">${b}</span>`).join('')}</div>`;
    t.addEventListener('click',()=>openGame(g));
    cupboardEl.appendChild(t);
  }
}

function openGame(g){
  document.body.classList.add('playing');
  stageEl.classList.add('on');
  stageEl.innerHTML =
    `<div class="gbar"><button class="back" type="button" id="back">← Cupboard</button>`+
    `<h2 class="gtitle">${g.name}</h2></div>`+
    `<div class="panel"><p class="status" id="status"></p><div id="board"></div>`+
    `<div class="controls" id="controls"></div></div>`;
  document.getElementById('back').addEventListener('click',closeGame);
  const helpers = {
    board: document.getElementById('board'),
    controls: document.getElementById('controls'),
    status: (t)=>{ document.getElementById('status').textContent = t; },
  };
  g.mount(helpers.board, helpers);
  location.hash = g.id;
  window.scrollTo(0,0);
}

function closeGame(){
  document.body.classList.remove('playing');
  stageEl.classList.remove('on');
  stageEl.innerHTML='';
  if(location.hash) history.replaceState(null,'',location.pathname+location.search);
}

window.addEventListener('hashchange',()=>{
  const id=location.hash.replace('#','');
  const g=GAMES.find(x=>x.id===id);
  if(g && !document.body.classList.contains('playing')) openGame(g);
  if(!id && document.body.classList.contains('playing')) closeGame();
});

// ---- Tic-Tac-Toe UI (logic from the TICTACTOE bundle) ----
function mountTicTacToe(host, h){
  let board, mode='ai', turn='X', over=false;
  const controls=h.controls;

  function newGame(){ board=TICTACTOE.emptyBoard(); turn='X'; over=false; draw(); }

  function think(){
    if(over) return;
    if(mode==='ai' && turn==='O'){
      const i=TICTACTOE.bestMove(board,'O');
      setTimeout(()=>{ if(over) return; board[i]='O'; turn='X'; resolve(); }, 260);
    }
  }
  function resolve(){ draw(); maybeEnd(); }
  function maybeEnd(){
    const w=TICTACTOE.winner(board);
    if(w){ over=true; draw(); }
    else if(mode==='ai') think();
  }
  function play(i){
    if(over||board[i]) return;
    if(mode==='ai' && turn==='O') return;
    board[i]=turn; turn = turn==='X'?'O':'X'; resolve();
  }
  function draw(){
    const w=TICTACTOE.winner(board);
    const lineCells = winningCells(board);
    h.status(
      w==='draw' ? 'A draw — well matched.' :
      w ? `${w} wins!` :
      mode==='ai' ? (turn==='X'?'Your turn — you’re ✕.':'Thinking…') :
      `${turn}’s turn.`
    );
    host.className='ttt';
    host.innerHTML='';
    for(let i=0;i<9;i++){
      const b=document.createElement('button');
      b.type='button';
      b.className = board[i]||'';
      if(lineCells.includes(i)) b.classList.add('win');
      b.textContent = board[i]==='X'?'✕':board[i]==='O'?'◯':'';
      b.setAttribute('aria-label', board[i]?`${board[i]} at ${i+1}`:`empty cell ${i+1}`);
      b.disabled = !!board[i]||over||(mode==='ai'&&turn==='O');
      b.addEventListener('click',()=>play(i));
      host.appendChild(b);
    }
  }
  function winningCells(bd){
    for(const ln of TICTACTOE.LINES){
      const [a,b,c]=ln;
      if(bd[a]&&bd[a]===bd[b]&&bd[a]===bd[c]) return ln;
    }
    return [];
  }

  controls.innerHTML='';
  const vsAi=ctrl('vs Computer',()=>{mode='ai';setModes();newGame();},true);
  const vs2=ctrl('2 Players',()=>{mode='2p';setModes();newGame();});
  const again=ctrl('New game',()=>newGame());
  again.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  function ctrl(label,fn,pressed){
    const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=label; if(pressed)b.setAttribute('aria-pressed','true');
    b.addEventListener('click',fn); controls.appendChild(b); return b;
  }
  setModes(); newGame();
}

// ---- Connect Four UI (logic from the CONNECT4 bundle) ----
function mountConnect4(host, h){
  const R=CONNECT4.ROWS, C=CONNECT4.COLS;
  let board, mode='ai', turn='R', over=false, busy=false;

  function newGame(){ board=CONNECT4.emptyBoard(); turn='R'; over=false; busy=false; draw(); }
  function play(col){
    if(over||busy) return;
    if(mode==='ai'&&turn==='Y') return;
    const res=CONNECT4.drop(board,col,turn);
    if(!res) return;
    board=res.board; advance();
  }
  function advance(){
    if(CONNECT4.winner(board)){ over=true; draw(); return; }
    turn = turn==='R'?'Y':'R'; draw();
    if(mode==='ai'&&turn==='Y'){
      busy=true;
      setTimeout(()=>{ if(over) return; const c=CONNECT4.bestMove(board,'Y');
        board=CONNECT4.drop(board,c,'Y').board; busy=false; advance(); }, 300);
    }
  }
  function winCells(bd){
    const DIRS=[[0,1],[1,0],[1,1],[1,-1]];
    for(let r=0;r<R;r++) for(let c=0;c<C;c++){ const p=bd[r*C+c]; if(!p) continue;
      for(const [dr,dc] of DIRS){ const cells=[r*C+c]; let ok=true;
        for(let k=1;k<4;k++){ const rr=r+dr*k, cc=c+dc*k;
          if(rr<0||rr>=R||cc<0||cc>=C||bd[rr*C+cc]!==p){ ok=false; break; } cells.push(rr*C+cc); }
        if(ok) return cells; } }
    return [];
  }
  function draw(){
    const w=CONNECT4.winner(board), wc=winCells(board);
    h.status(
      w==='draw' ? 'A draw — the board is full.' :
      w ? `${w==='R'?'Red':'Yellow'} wins!` :
      mode==='ai' ? (turn==='R'?'Your turn — you’re red.':'Thinking…') :
      `${turn==='R'?'Red':'Yellow'}’s turn.`
    );
    host.className='c4'; host.innerHTML='';
    for(let r=0;r<R;r++) for(let c=0;c<C;c++){
      const v=board[r*C+c];
      const cell=document.createElement('button'); cell.type='button'; cell.className='c4cell';
      if(v) cell.classList.add(v);
      if(wc.includes(r*C+c)) cell.classList.add('win');
      cell.setAttribute('aria-label', v?`${v==='R'?'red':'yellow'} disc at row ${r+1}, column ${c+1}`:`drop a disc in column ${c+1}`);
      cell.disabled = over||busy||board[c]!=null||(mode==='ai'&&turn==='Y');
      cell.addEventListener('click',()=>play(c));
      host.appendChild(cell);
    }
  }
  const controls=h.controls; controls.innerHTML='';
  const vsAi=ctrl('vs Computer',()=>{mode='ai';setModes();newGame();},true);
  const vs2=ctrl('2 Players',()=>{mode='2p';setModes();newGame();});
  const again=ctrl('New game',()=>newGame()); again.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  function ctrl(label,fn,p){ const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=label; if(p)b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  setModes(); newGame();
}

// ---- 2048 UI (logic from the G2048 bundle) ----
function mountG2048(host, h){
  let grid, score=0, over=false;
  function start(){ grid=G2048.spawn(G2048.spawn(Array(16).fill(null))); score=0; over=false; draw(); }
  function doMove(dir){
    if(over) return;
    const r=G2048.move(grid, dir);
    if(!r.moved) return;
    grid=G2048.spawn(r.grid); score+=r.gained;
    if(!G2048.canMove(grid)) over=true;
    draw(G2048.won(grid) ? `You reached 2048! Score ${score} — keep going.` : null);
  }
  function draw(msg){
    h.status(msg || (over ? `No moves left — final score ${score}.` : `Score ${score}`));
    host.className='g2048'; host.innerHTML='';
    for(let i=0;i<16;i++){
      const v=grid[i];
      const t=document.createElement('div');
      t.className='t'+(v?' v'+v:''); t.textContent=v||'';
      host.appendChild(t);
    }
  }
  const controls=h.controls; controls.innerHTML='';
  const pad=document.createElement('div'); pad.className='pad';
  [['up','▲'],['left','◀'],['down','▼'],['right','▶']].forEach(([dir,sym])=>{
    const b=document.createElement('button'); b.type='button'; b.className=dir; b.textContent=sym;
    b.setAttribute('aria-label','move '+dir); b.addEventListener('click',()=>doMove(dir)); pad.appendChild(b);
  });
  controls.appendChild(pad);
  const again=document.createElement('button'); again.className='btn ghost'; again.type='button';
  again.textContent='New game'; again.addEventListener('click',start); controls.appendChild(again);
  function onKey(e){
    if(!host.isConnected){ window.removeEventListener('keydown', onKey); return; }
    const dir={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'}[e.key];
    if(dir){ e.preventDefault(); doMove(dir); }
  }
  window.addEventListener('keydown', onKey);
  let sx=0, sy=0;
  host.addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;},{passive:true});
  host.addEventListener('touchend',e=>{
    const t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.max(Math.abs(dx),Math.abs(dy))<24) return;
    doMove(Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up'));
  },{passive:true});
  start();
}

// ---- Memory UI (deck from the MEMORY bundle) ----
function mountMemory(host, h){
  const SYMS=['🍎','🍌','🍇','🍓','🍊','🍑','🥝','🫐'];
  let deck, flipped, matched, moves, busy;
  function start(){ deck=MEMORY.newDeck(SYMS); flipped=[]; matched=new Set(); moves=0; busy=false; draw(); }
  function flip(i){
    if(busy||matched.has(i)||flipped.includes(i)) return;
    flipped.push(i); draw();
    if(flipped.length===2){
      moves++;
      const [a,b]=flipped;
      if(deck[a].sym===deck[b].sym){
        matched.add(a); matched.add(b); flipped=[]; draw();
        if(matched.size===deck.length) h.status(`Solved in ${moves} moves!`);
      } else {
        busy=true; setTimeout(()=>{ flipped=[]; busy=false; draw(); }, 850);
      }
    }
  }
  function draw(){
    if(matched.size!==deck.length) h.status(`Moves: ${moves} · pairs ${matched.size/2} of ${deck.length/2}`);
    host.className='mem'; host.style.gridTemplateColumns='repeat(4,1fr)'; host.innerHTML='';
    deck.forEach((card,i)=>{
      const up=matched.has(i)||flipped.includes(i);
      const el=document.createElement('button'); el.type='button';
      el.className='card'+(matched.has(i)?' done':(up?' up':''));
      el.textContent=up?card.sym:'';
      el.setAttribute('aria-label', up?card.sym:`face-down card ${i+1}`);
      el.disabled=matched.has(i);
      el.addEventListener('click',()=>flip(i));
      host.appendChild(el);
    });
  }
  const controls=h.controls; controls.innerHTML='';
  const again=document.createElement('button'); again.className='btn'; again.type='button';
  again.textContent='New game'; again.addEventListener('click',start); controls.appendChild(again);
  start();
}

// ---- Hexcodle UI (logic from the HEXCODLE bundle) ----
function mountHexcodle(host, h){
  const now=new Date();
  const seed=now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate();
  const target=HEXCODLE.dailyTarget(seed);
  const MAX=6;
  let guesses=[], done=false;
  function submit(val){
    if(done) return;
    val=String(val).replace(/^#/,'').toLowerCase().trim();
    if(!HEXCODLE.isValidHex(val)){ h.status('Enter 6 hex digits (0-9, a-f).'); return; }
    guesses.push({val, fb:HEXCODLE.feedback(val, target)});
    if(guesses[guesses.length-1].fb.every(f=>f==='ok') || guesses.length>=MAX) done=true;
    draw();
  }
  function draw(){
    host.className='hex'; host.innerHTML='';
    for(const g of guesses){
      const row=document.createElement('div'); row.className='row';
      g.val.split('').forEach((ch,i)=>{
        const c=document.createElement('div'); c.className='cell '+g.fb[i];
        c.innerHTML=`${ch}<small>${g.fb[i]==='ok'?'✓':g.fb[i]==='lo'?'▲':'▼'}</small>`;
        row.appendChild(c);
      });
      host.appendChild(row);
    }
    if(done){
      const win=guesses.length && guesses[guesses.length-1].fb.every(f=>f==='ok');
      const sw=document.createElement('div'); sw.className='swatch'; sw.style.background='#'+target;
      host.appendChild(sw);
      h.status(win ? `Got it in ${guesses.length}! It was #${target}.` : `Out of guesses — it was #${target}.`);
    } else {
      h.status(`Guess today’s colour · ${guesses.length}/${MAX}. ▲ go higher, ▼ go lower.`);
      const row=document.createElement('div'); row.className='row';
      const inp=document.createElement('input'); inp.maxLength=7; inp.placeholder='a1b2c3';
      inp.setAttribute('aria-label','hex colour guess'); inp.spellcheck=false;
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(inp.value); });
      row.appendChild(inp); host.appendChild(row);
      inp.focus();
    }
  }
  const controls=h.controls; controls.innerHTML='';
  const go=document.createElement('button'); go.className='btn'; go.type='button'; go.textContent='Guess';
  go.addEventListener('click',()=>{ const inp=host.querySelector('input'); if(inp) submit(inp.value); });
  controls.appendChild(go);
  draw();
}

function mountReversi(host, h){
  let board, mode='ai', turn='B', over=false, busy=false, note='';

  function newGame(){ board=REVERSI.emptyBoard(); turn='B'; over=false; busy=false; note=''; resolve(); }

  // Whose turn it is is `turn`. After any board change we resolve passes (a side
  // with no move passes; winner()!==null only when neither side can move, so at
  // most one pass happens here) and, in vs-Computer, schedule White's reply.
  function resolve(){
    over = REVERSI.winner(board)!==null;
    if(!over && REVERSI.legalMoves(board, turn).length===0){
      note = (turn==='B'?'Black':'White')+' has no move — passes.';
      turn = turn==='B'?'W':'B';
    } else {
      note = '';
    }
    draw();
    if(over) return;
    if(mode==='ai' && turn==='W'){
      busy=true;
      setTimeout(()=>{
        if(!host.isConnected || over){ busy=false; return; }
        const m=REVERSI.bestMove(board,'W');
        if(m>=0) board=REVERSI.applyMove(board, m, 'W');
        busy=false; turn='B'; resolve();
      }, 280);
    }
  }

  function play(i){
    if(over||busy) return;
    if(mode==='ai' && turn==='W') return;
    if(!REVERSI.legalMoves(board, turn).includes(i)) return;
    board=REVERSI.applyMove(board, i, turn);
    turn = turn==='B'?'W':'B';
    resolve();
  }

  function draw(){
    const sc=REVERSI.score(board);
    const w=over ? REVERSI.winner(board) : null;
    let status;
    if(w==='draw') status=`An even board — ${sc.B}–${sc.W}. A draw.`;
    else if(w) status=`${w==='B'?'Black':'White'} wins ${Math.max(sc.B,sc.W)}–${Math.min(sc.B,sc.W)}!`;
    else {
      const whose = mode==='ai'
        ? (turn==='B'?'Your turn — you’re black.':'Thinking…')
        : `${turn==='B'?'Black':'White'}’s turn.`;
      status=`${note?note+' ':''}${whose}  ●${sc.B} ○${sc.W}`;
    }
    h.status(status);

    host.className='reversi'; host.innerHTML='';
    const grid=document.createElement('div'); grid.className='board';
    const hints = (!over && !busy && !(mode==='ai'&&turn==='W'))
      ? REVERSI.legalMoves(board, turn) : [];
    for(let i=0;i<64;i++){
      const v=board[i], r=Math.floor(i/8), c=i%8;
      const cell=document.createElement('button'); cell.type='button'; cell.className='cell';
      if(hints.includes(i)) cell.classList.add('hint');
      if(v){ const d=document.createElement('span'); d.className='disc '+v; cell.appendChild(d); }
      cell.setAttribute('aria-label',
        v ? `${v==='B'?'black':'white'} disc at row ${r+1}, column ${c+1}`
          : hints.includes(i) ? `play row ${r+1}, column ${c+1}`
          : `empty row ${r+1}, column ${c+1}`);
      cell.disabled = over||busy||!hints.includes(i);
      cell.addEventListener('click',()=>play(i));
      grid.appendChild(cell);
    }
    host.appendChild(grid);
  }

  const controls=h.controls; controls.innerHTML='';
  const vsAi=ctrl('vs Computer',()=>{mode='ai';setModes();newGame();},true);
  const vs2=ctrl('2 Players',()=>{mode='2p';setModes();newGame();});
  const again=ctrl('New game',()=>newGame()); again.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  function ctrl(label,fn,p){ const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=label; if(p)b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  setModes(); newGame();
}

// ---- Nim UI (logic from the NIM bundle) ----
function mountNim(host, h){
  let heaps, mode='ai', turn=0, over=false, busy=false, gen=0;

  function newGame(){ gen++; heaps=NIM.initialHeaps(); turn=0; over=false; busy=false; draw(); }

  // A human move: take `count` from row `heapIndex`.
  function play(heapIndex, count){
    if(over||busy) return;
    if(mode==='ai' && turn===1) return;
    const next=NIM.take(heaps, heapIndex, count);
    if(!next) return;
    heaps=next; advance();
  }

  // After any move: end if the heaps are empty (mover took the last token and
  // wins — we leave `turn` on them), otherwise pass the turn and, vs the
  // computer, let it answer optimally.
  function advance(){
    if(NIM.isOver(heaps)){ over=true; draw(); return; }
    turn = turn===0 ? 1 : 0; draw();
    if(mode==='ai' && turn===1){
      busy=true;
      const myGen=gen;
      setTimeout(()=>{
        if(over || myGen!==gen || !host.isConnected) return; // stale: game ended, restarted, or closed
        const m=NIM.bestMove(heaps);
        heaps=NIM.take(heaps, m.heap, m.count);
        busy=false; advance();
      }, 300);
    }
  }

  function draw(){
    if(over){
      const winner = mode==='ai' ? (turn===0?'You':'The computer') : 'Player '+(turn+1);
      h.status(winner==='You'
        ? 'You took the last token — you win!'
        : winner+' took the last token and wins!');
    } else if(mode==='ai'){
      h.status(turn===0 ? 'Your turn — take any number from a single row.' : 'The computer is thinking…');
    } else {
      h.status('Player '+(turn+1)+'’s turn — take any number from a single row.');
    }
    host.className='nim'; host.innerHTML='';
    const locked = over||busy||(mode==='ai'&&turn===1);
    heaps.forEach((size, hi)=>{
      const row=document.createElement('div'); row.className='nim-row';
      const label=document.createElement('span'); label.className='nim-rowlabel';
      label.textContent='Row '+(hi+1); label.setAttribute('aria-hidden','true');
      row.appendChild(label);
      const track=document.createElement('div'); track.className='nim-track';
      track.setAttribute('aria-label', 'Row '+(hi+1)+': '+size+' token'+(size===1?'':'s'));
      for(let i=0;i<size;i++){
        const count=size-i; // this token plus every token after it in the row
        const tok=document.createElement('button'); tok.type='button'; tok.className='nim-token';
        tok.setAttribute('aria-label', 'Take '+count+' token'+(count===1?'':'s')+' from row '+(hi+1));
        tok.disabled=locked;
        tok.addEventListener('click',()=>play(hi, count));
        track.appendChild(tok);
      }
      if(size===0){
        const empty=document.createElement('span'); empty.className='nim-empty';
        empty.textContent='— empty —'; empty.setAttribute('aria-hidden','true');
        track.appendChild(empty);
      }
      row.appendChild(track);
      host.appendChild(row);
    });
  }

  const controls=h.controls; controls.innerHTML='';
  const vsAi=ctrl('vs Computer',()=>{mode='ai';setModes();newGame();},true);
  const vs2=ctrl('2 Players',()=>{mode='2p';setModes();newGame();});
  const again=ctrl('New game',()=>newGame()); again.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  function ctrl(label,fn,pressed){ const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=label; if(pressed)b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  setModes(); newGame();
}

// ---- Hangman UI (word logic from the HANGMAN bundle) ----
function mountHangman(host, h){
  let word, guessed, over, won;
  const KEYS='abcdefghijklmnopqrstuvwxyz';

  function start(){
    word=HANGMAN.pickWord();
    guessed=new Set();
    over=false; won=false;
    draw();
  }
  function guess(ch){
    if(over||guessed.has(ch)) return;
    guessed.add(ch);
    won=HANGMAN.isWon(word, guessed);
    if(won || HANGMAN.wrongGuesses(word, guessed).length>=HANGMAN.MAX_WRONG) over=true;
    draw();
  }
  // Gallows + figure: 4 fixed scaffold strokes, then one body part per wrong guess.
  function gallows(n){
    const part=(i,svg)=> n>=i ? svg : '';
    return '<svg viewBox="0 0 120 140" class="hm-svg" role="img" aria-label="'+n+' of '+HANGMAN.MAX_WRONG+' wrong">'+
      '<line x1="8" y1="134" x2="78" y2="134"/>'+
      '<line x1="28" y1="134" x2="28" y2="8"/>'+
      '<line x1="28" y1="8" x2="84" y2="8"/>'+
      '<line x1="84" y1="8" x2="84" y2="22"/>'+
      part(1,'<circle class="b" cx="84" cy="34" r="12"/>')+
      part(2,'<line class="b" x1="84" y1="46" x2="84" y2="90"/>')+
      part(3,'<line class="b" x1="84" y1="58" x2="66" y2="74"/>')+
      part(4,'<line class="b" x1="84" y1="58" x2="102" y2="74"/>')+
      part(5,'<line class="b" x1="84" y1="90" x2="68" y2="116"/>')+
      part(6,'<line class="b" x1="84" y1="90" x2="100" y2="116"/>')+
      '</svg>';
  }
  function draw(){
    const wrong=HANGMAN.wrongGuesses(word, guessed);
    host.className='hangman'; host.innerHTML='';

    const fig=document.createElement('div'); fig.className='hm-figure';
    fig.innerHTML=gallows(wrong.length); host.appendChild(fig);

    const w=document.createElement('div'); w.className='hm-word';
    w.textContent=HANGMAN.revealed(word, guessed);
    w.setAttribute('aria-label', over&&!won ? 'The word was '+word : 'word to guess'); host.appendChild(w);

    const meter=document.createElement('div'); meter.className='hm-meter';
    meter.innerHTML=wrong.length+' of '+HANGMAN.MAX_WRONG+' wrong'+
      (wrong.length ? ' · <b>'+wrong.join(' ')+'</b>' : ''); host.appendChild(meter);

    const kb=document.createElement('div'); kb.className='hm-keys';
    for(const ch of KEYS){
      const used=guessed.has(ch);
      const key=document.createElement('button'); key.type='button'; key.className='hm-key';
      if(used) key.classList.add(word.includes(ch)?'hit':'miss');
      key.textContent=ch.toUpperCase();
      key.disabled=used||over;
      key.setAttribute('aria-label','guess '+ch);
      key.addEventListener('click',()=>guess(ch));
      kb.appendChild(key);
    }
    host.appendChild(kb);

    h.status(
      won  ? 'You saved the day! The word was "'+word+'".' :
      over ? 'Out of guesses — the word was "'+word+'".' :
             'Guess the word · '+wrong.length+' of '+HANGMAN.MAX_WRONG+' wrong.'
    );
  }
  // Physical-keyboard support; self-removes once the stage is torn down.
  function onKey(e){
    if(!host.isConnected){ window.removeEventListener('keydown', onKey); return; }
    const ch=e.key.toLowerCase();
    if(ch.length===1 && ch>='a' && ch<='z') guess(ch);
  }
  window.addEventListener('keydown', onKey);

  const controls=h.controls; controls.innerHTML='';
  const again=document.createElement('button'); again.className='btn'; again.type='button';
  again.textContent='New word'; again.addEventListener('click',start); controls.appendChild(again);

  start();
}

function mountHex(host, h){
  const N=HEX.SIZE;
  let board, mode='ai', turn='R', over=false, busy=false;

    if(over||busy) return;
    if(mode==='ai'&&turn==='B') return;
    const b=HEX.place(board,i,turn);
    if(!b) return;

    if(HEX.winner(board)){ over=true; draw(); return; }

      busy=true;
      setTimeout(()=>{
        if(over||!host.isConnected) return;
        const m=HEX.bestMove(board,'B');

      }, 300);
    }
  }
  function draw(){
    const w=HEX.winner(board);
    h.status(
      w==='R' ? 'Red wins — joined top to bottom!' :
      w==='B' ? 'Blue wins — joined left to right!' :
      mode==='ai' ? (turn==='R' ? 'Your move — Red joins top ↕ bottom.' : 'Computer is thinking…') :

        cell.setAttribute('aria-label', v ? (v==='R'?'red':'blue')+' stone at row '+(r+1)+', column '+(c+1) : 'play row '+(r+1)+', column '+(c+1));

    const legend=document.createElement('div'); legend.className='legend';
    legend.innerHTML='<span class="r">● Red · top ↕ bottom</span><span class="b">● Blue · left ↔ right</span>';
    host.appendChild(legend);
  }
  const controls=h.controls; controls.innerHTML='';
  const vsAi=ctrl('vs Computer',()=>{mode='ai';setModes();newGame();},true);
  const vs2=ctrl('2 Players',()=>{mode='2p';setModes();newGame();});
  const again=ctrl('New game',()=>newGame()); again.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  function ctrl(label,fn,p){ const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=label; if(p)b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  setModes(); newGame();
}

function mountMinesweeper(host, h){
  const R=MINESWEEPER.ROWS, C=MINESWEEPER.COLS, M=MINESWEEPER.MINES;
  let model=null, over=false, won=false, flagMode=false;
  const controls=h.controls; controls.innerHTML='';
  const flagBtn=document.createElement('button');
  flagBtn.className='btn'; flagBtn.type='button'; flagBtn.textContent='🚩 Flag mode';
  flagBtn.setAttribute('aria-pressed','false');
  flagBtn.addEventListener('click',()=>{
    flagMode=!flagMode;
    flagBtn.setAttribute('aria-pressed', flagMode?'true':'false');
  });
  const again=document.createElement('button');
  again.className='btn ghost'; again.type='button'; again.textContent='New game';
  again.addEventListener('click',start);
  controls.appendChild(flagBtn); controls.appendChild(again);

  function start(){
    model=null; over=false; won=false;
    flagMode=false; flagBtn.setAttribute('aria-pressed','false');
    draw();
  }
  function tap(i){
    if(over) return;
    if(model===null) model=MINESWEEPER.newGame(Math.random, i); // first tap is always safe
    if(flagMode){
      model=MINESWEEPER.toggleFlag(model, i);
    } else {
      if(model.flagged.has(i)) return;
      model=MINESWEEPER.reveal(model, i);
      if(model.dead) over=true;
      else if(MINESWEEPER.isWon(model)){ over=true; won=true; }
    }
    draw();
  }
  function draw(){
    const flags = model ? model.flagged.size : 0;
    if(over && won) h.status('Swept the board — every mine avoided! 🎉');
    else if(over) h.status('Boom — you hit a mine. 💥 New game?');
    else if(model===null) h.status('Tap any square to begin — your first tap is always safe.');
    else h.status('Mines: '+M+' · 🚩 '+flags+' flagged · '+(M-flags)+' to find');
    host.className='mines'; host.innerHTML='';
    const board=document.createElement('div'); board.className='board';
    for(let i=0;i<R*C;i++){
      const cell=document.createElement('button'); cell.type='button'; cell.className='cell';
      let label='hidden square '+(i+1);
      if(model){
        const rev=model.revealed.has(i), fl=model.flagged.has(i), mine=model.mines.has(i);
        if(rev){
          cell.classList.add('open');
          if(mine){ cell.classList.add('mine'); cell.textContent='💣'; label='mine'; }
          else { const n=model.counts[i]; if(n>0){ cell.textContent=n; cell.classList.add('n'+n); label=n+' adjacent'; } else { label='empty'; } }
        } else if(over && mine){
          cell.classList.add('open','mine'); cell.textContent='💣'; label='mine';
        } else if(fl){
          cell.classList.add('flag'); cell.textContent='🚩'; label='flag';
        }
      }
      cell.setAttribute('aria-label', label);
      cell.disabled = over;
      cell.addEventListener('click',()=>tap(i));
      board.appendChild(cell);
    }
    host.appendChild(board);
  }
  start();
}

function mountMastermind(host, h){
  const COLORS=MASTERMIND.COLORS, LEN=MASTERMIND.CODE_LEN, MAX=MASTERMIND.MAX_GUESSES;
  const NAMES={r:'red',o:'orange',y:'yellow',g:'green',b:'blue',p:'purple'};
  let code, rows, current, over, won;

  function start(){ code=MASTERMIND.secret(); rows=[]; current=[]; over=false; won=false; draw(); }
  function place(c){ if(over||current.length>=LEN) return; current.push(c); draw(); }
  function removeAt(i){ if(over||i>=current.length) return; current.splice(i,1); draw(); }
  function clearLast(){ if(over||!current.length) return; current.pop(); draw(); }
  function submit(){
    if(over||current.length!==LEN) return;
    const res=MASTERMIND.score(current, code);
    rows.push({guess:current.slice(), black:res.black, white:res.white});
    current=[];
    if(MASTERMIND.isWin(res)){ won=true; over=true; }
    else if(rows.length>=MAX){ over=true; }
    draw();
  }

  function peg(c, onClick){
    const el=document.createElement(onClick?'button':'div');
    el.className='mm-peg'+(c?' c-'+c:' slot');
    if(onClick){ el.type='button'; el.addEventListener('click', onClick); }
    el.setAttribute('aria-label', c?NAMES[c]:'empty slot');
    return el;
  }
  function feedback(black, white){
    const fb=document.createElement('div'); fb.className='mm-feedback';
    fb.setAttribute('aria-label', black+' black, '+white+' white');
    for(let i=0;i<LEN;i++){
      const d=document.createElement('div');
      d.className='mm-fb '+(i<black?'black':(i<black+white?'white':'none'));
      fb.appendChild(d);
    }
    return fb;
  }
  function pegRow(){ const p=document.createElement('div'); p.className='mm-pegs'; return p; }
  function row(n, pegs, fb){
    const r=document.createElement('div'); r.className='mm-row'+(fb?'':' active');
    const num=document.createElement('div'); num.className='mm-num'; num.textContent=n; r.appendChild(num);
    r.appendChild(pegs);
    r.appendChild(fb||feedback(0,0));
    return r;
  }

  function draw(){
    host.className='mm'; host.innerHTML='';
    const board=document.createElement('div'); board.className='mm-board';

    rows.forEach((rw,i)=>{
      const pegs=pegRow(); rw.guess.forEach(c=>pegs.appendChild(peg(c)));
      board.appendChild(row(i+1, pegs, feedback(rw.black, rw.white)));
    });

    if(!over){
      const pegs=pegRow();
      for(let i=0;i<LEN;i++){
        const c=current[i];
        pegs.appendChild(c ? peg(c, ()=>removeAt(i)) : peg(null));
      }
      board.appendChild(row(rows.length+1, pegs, null));
    }
    host.appendChild(board);

    if(over && !won){
      const rev=document.createElement('div'); rev.className='mm-reveal';
      const label=document.createElement('span'); label.className='mm-revlabel'; label.textContent='The code was'; rev.appendChild(label);
      const pegs=pegRow(); code.forEach(c=>pegs.appendChild(peg(c))); rev.appendChild(pegs);
      host.appendChild(rev);
    }

    if(!over){
      const pal=document.createElement('div'); pal.className='mm-palette';
      COLORS.forEach(c=>{
        const sw=document.createElement('button'); sw.type='button'; sw.className='mm-swatch c-'+c;
        sw.setAttribute('aria-label','add '+NAMES[c]);
        sw.addEventListener('click',()=>place(c));
        pal.appendChild(sw);
      });
      host.appendChild(pal);

      const acts=document.createElement('div'); acts.className='mm-actions';
      const undo=document.createElement('button'); undo.type='button'; undo.className='mm-act';
      undo.textContent='⌫ Undo'; undo.disabled=!current.length; undo.addEventListener('click', clearLast);
      const go=document.createElement('button'); go.type='button'; go.className='mm-act primary';
      go.textContent='Guess'; go.disabled=current.length!==LEN; go.addEventListener('click', submit);
      acts.appendChild(undo); acts.appendChild(go);
      host.appendChild(acts);
    }

    const remaining=MAX-rows.length;
    h.status(
      won  ? 'Cracked it in '+rows.length+' '+(rows.length===1?'guess':'guesses')+'!' :
      over ? 'Out of guesses — the code was '+code.map(c=>NAMES[c]).join(', ')+'.' :
             remaining+' guess'+(remaining===1?'':'es')+' left · tap colours, then Guess.'
    );
  }

  const controls=h.controls; controls.innerHTML='';
  const again=document.createElement('button'); again.className='btn'; again.type='button';
  again.textContent='New game'; again.addEventListener('click', start); controls.appendChild(again);

  start();
}

function mountWordle(host, h){
  host.className='wordle'; host.innerHTML='';
  const now=new Date();
  const seed=now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate();
  const answer=WORDLE.dailyAnswer(seed);
  const LEN=WORDLE.WORD_LEN, MAX=WORDLE.MAX_GUESSES;
  let rows=[], cur='', done=false, win=false;

  const gridEl=document.createElement('div'); gridEl.className='wgrid';
  const kbEl=document.createElement('div'); kbEl.className='wkeys';
  host.appendChild(gridEl); host.appendChild(kbEl);

  const rank={correct:3, present:2, absent:1};
  function keyState(){
    const m={};
    for(const r of rows){
      for(let i=0;i<LEN;i++){
        const ch=r.word[i], st=r.marks[i];
        if(!m[ch] || rank[st]>rank[m[ch]]) m[ch]=st;
      }
    }
    return m;
  }

  function drawGrid(){
    gridEl.innerHTML='';
    for(let r=0;r<MAX;r++){
      const filled=rows[r];
      const typing=!done && r===rows.length;
      const row=document.createElement('div'); row.className='wrow';
      for(let c=0;c<LEN;c++){
        const cell=document.createElement('div'); cell.className='wcell';
        if(filled){ cell.textContent=filled.word[c]; cell.classList.add(filled.marks[c]); }
        else if(typing && c<cur.length){ cell.textContent=cur[c]; cell.classList.add('typed'); }
        row.appendChild(cell);
      }
      gridEl.appendChild(row);
    }
  }

  const KB=[ 'qwertyuiop'.split(''), 'asdfghjkl'.split(''), ['enter',...'zxcvbnm'.split(''),'back'] ];
  function drawKeys(){
    kbEl.innerHTML='';
    const ks=keyState();
    for(const line of KB){
      const rowEl=document.createElement('div'); rowEl.className='wkrow';
      for(const k of line){
        const b=document.createElement('button'); b.type='button'; b.className='wkey';
        if(k==='enter'){ b.classList.add('wide'); b.textContent='Enter'; }
        else if(k==='back'){ b.classList.add('wide'); b.textContent='⌫'; b.setAttribute('aria-label','Backspace'); }
        else { b.textContent=k; if(ks[k]) b.classList.add(ks[k]); }
        b.addEventListener('click',()=>press(k));
        rowEl.appendChild(b);
      }
      kbEl.appendChild(rowEl);
    }
  }

  function setStatus(){
    if(done) h.status(win
      ? `Solved in ${rows.length}/${MAX}! Today’s word was ${answer.toUpperCase()}.`
      : `Out of guesses — today’s word was ${answer.toUpperCase()}.`);
    else h.status(`Guess today’s word · row ${rows.length+1} of ${MAX}.`);
  }

  let flash=0;
  function note(msg){
    h.status(msg);
    const id=++flash;
    setTimeout(()=>{ if(id===flash && !done) setStatus(); }, 1500);
  }

  function press(k){
    if(done) return;
    if(k==='back'){ if(cur.length){ cur=cur.slice(0,-1); drawGrid(); } return; }
    if(k==='enter'){ submit(); return; }
    if(/^[a-z]$/.test(k) && cur.length<LEN){ cur+=k; drawGrid(); }
  }

  function submit(){
    if(cur.length<LEN){ note('Not enough letters.'); return; }
    if(!WORDLE.isAllowed(cur)){ note(`“${cur.toUpperCase()}” isn’t in the word list.`); return; }
    const marks=WORDLE.score(cur, answer);
    rows.push({word:cur, marks});
    const solved=marks.every(m=>m==='correct');
    cur='';
    if(solved){ done=true; win=true; }
    else if(rows.length>=MAX){ done=true; win=false; }
    drawGrid(); drawKeys(); setStatus();
  }

  function onKey(e){
    if(!host.isConnected){ window.removeEventListener('keydown', onKey); return; }
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(e.key==='Enter'){ e.preventDefault(); press('enter'); }
    else if(e.key==='Backspace'){ e.preventDefault(); press('back'); }
    else if(/^[a-zA-Z]$/.test(e.key)) press(e.key.toLowerCase());
  }
  window.addEventListener('keydown', onKey);

  drawGrid(); drawKeys(); setStatus();
}

// ---- Crazy Eights UI (logic from the CRAZYEIGHTS bundle) ----
function mountCrazyeights(host, h){
  let you, cpu, draw, discard, activeSuit, turn, over, busy, choosing, winner, gen=0;

  const top = ()=>discard[discard.length-1];
  const isRed = (s)=>s===1||s===2; // ♥ ♦
  const canDraw = ()=>draw.length>0 || discard.length>1;

  function newGame(){
    gen++;
    const dealt = CRAZYEIGHTS.deal(CRAZYEIGHTS.shuffle(CRAZYEIGHTS.makeDeck()), 7);
    you=dealt.p0; cpu=dealt.p1; draw=dealt.draw; discard=dealt.discard;
    activeSuit=dealt.activeSuit; turn=0; over=false; busy=false; choosing=false; winner=null;
    render();
  }

  // Refill the draw pile from the discard pile (keeping its top) when it runs dry.
  function reshuffle(){
    if(draw.length===0 && discard.length>1){
      const t=discard.pop();
      const rest=discard;
      for(let i=rest.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const x=rest[i]; rest[i]=rest[j]; rest[j]=x; }
      draw=rest; discard=[t];
    }
  }
  function drawCard(hand){ reshuffle(); if(draw.length){ hand.push(draw.pop()); return true; } return false; }

  // ---- Human turn ----
  function playYou(i){
    if(over||busy||choosing||turn!==0) return;
    const c=you[i];
    if(!c || !CRAZYEIGHTS.canPlay(c, top(), activeSuit)) return;
    you.splice(i,1); discard.push(c);
    if(you.length===0){ over=true; winner=0; render(); return; } // emptied your hand — you win
    if(c.rank===8){ choosing=true; render(); return; } // pick a suit before passing
    activeSuit=c.suit; endTurn();
  }
  function chooseSuit(s){
    if(!choosing) return;
    activeSuit=s; choosing=false; endTurn();
  }
  function drawYou(){
    if(over||busy||choosing||turn!==0) return;
    if(!drawCard(you)){ passYou(); return; }
    render(); // you may now have a legal play, or draw/pass again
  }
  function passYou(){
    if(over||busy||choosing||turn!==0) return;
    turn=1; render(); scheduleCpu();
  }
  function endTurn(){ turn=1; render(); scheduleCpu(); }

  // ---- Computer turn ----
  function scheduleCpu(){
    if(over || turn!==1) return;
    busy=true;
    const myGen=gen;
    setTimeout(()=>{
      if(myGen!==gen || !host.isConnected) return; // restarted or closed
      let card=CRAZYEIGHTS.aiPlay(cpu, top(), activeSuit);
      let guard=0;
      while(!card && canDraw() && guard<70){ drawCard(cpu); card=CRAZYEIGHTS.aiPlay(cpu, top(), activeSuit); guard++; }
      if(card){
        cpu.splice(cpu.indexOf(card),1); discard.push(card);
        activeSuit = card.rank===8 ? CRAZYEIGHTS.aiSuit(cpu) : card.suit;
        if(cpu.length===0){ over=true; winner=1; }
        else turn=0;
      } else {
        turn=0; // could not play even after drawing — pass back to you
      }
      busy=false; render();
    }, 650);
  }

  // ---- Rendering ----
  function cardFace(c, variant){
    const el=document.createElement(variant==='btn' ? 'button' : 'div');
    el.className='card '+(isRed(c.suit)?'red':'black');
    if(variant==='lg') el.classList.add('lg');
    if(variant==='btn') el.type='button';
    const r=document.createElement('span'); r.className='rank'; r.textContent=CRAZYEIGHTS.rankLabel(c.rank);
    const p=document.createElement('span'); p.className='pip'; p.textContent=CRAZYEIGHTS.SUITS[c.suit];
    el.appendChild(r); el.appendChild(p);
    el.setAttribute('aria-label', CRAZYEIGHTS.rankLabel(c.rank)+' of '+['spades','hearts','diamonds','clubs'][c.suit]);
    return el;
  }

  function render(){
    if(over){ h.status(winner===0 ? 'You emptied your hand — you win!' : 'The computer went out first. Try again!'); }
    else if(choosing){ h.status('You played an 8 — choose the new suit.'); }
    else if(turn===1){ h.status('The computer is thinking…'); }
    else {
      const legal=CRAZYEIGHTS.legalPlays(you, top(), activeSuit);
      h.status(legal.length ? 'Your turn — play a card.' : (canDraw()?'No play — draw a card.':'No play and no cards left — pass.'));
    }

    host.className='c8'; host.innerHTML='';

    // opponent
    const opp=document.createElement('div'); opp.className='opp';
    const oppLabel=document.createElement('span'); oppLabel.className='opp-label';
    oppLabel.textContent='Computer · '+cpu.length+(cpu.length===1?' card':' cards');
    opp.appendChild(oppLabel);
    const backs=document.createElement('div'); backs.className='backs';
    for(let i=0;i<cpu.length;i++){ const b=document.createElement('span'); b.className='back'; b.setAttribute('aria-hidden','true'); backs.appendChild(b); }
    opp.appendChild(backs);
    host.appendChild(opp);

    // table: discard top + active suit + draw count
    const mat=document.createElement('div'); mat.className='mat';
    mat.appendChild(cardFace(top(), 'lg'));
    const info=document.createElement('div'); info.className='info';
    const chip=document.createElement('span'); chip.className='suitchip '+(isRed(activeSuit)?'red':'black');
    chip.innerHTML='Active suit <b>'+CRAZYEIGHTS.SUITS[activeSuit]+'</b>';
    const pile=document.createElement('span'); pile.className='pile';
    pile.textContent='Draw pile · '+draw.length;
    info.appendChild(chip); info.appendChild(pile);
    mat.appendChild(info);
    host.appendChild(mat);

    // your hand
    const handWrap=document.createElement('div'); handWrap.className='handwrap';
    const yourLabel=document.createElement('div'); yourLabel.className='you-label'; yourLabel.textContent='Your hand';
    handWrap.appendChild(yourLabel);
    const hand=document.createElement('div'); hand.className='hand';
    const lockHand = over||busy||choosing||turn!==0;
    you.forEach((c,i)=>{
      const b=cardFace(c, 'btn');
      const playable = !lockHand && CRAZYEIGHTS.canPlay(c, top(), activeSuit);
      b.disabled = lockHand || !playable;
      if(!b.disabled) b.classList.add('live');
      b.addEventListener('click',()=>playYou(i));
      hand.appendChild(b);
    });
    handWrap.appendChild(hand);
    host.appendChild(handWrap);

    // controls
    const controls=h.controls; controls.innerHTML='';
    if(choosing){
      const ask=document.createElement('span'); ask.className='suit-ask'; ask.textContent='New suit:';
      controls.appendChild(ask);
      for(let s=0;s<4;s++){
        const sb=document.createElement('button'); sb.type='button';
        sb.className='btn suit '+(isRed(s)?'red':'black');
        sb.textContent=CRAZYEIGHTS.SUITS[s];
        sb.setAttribute('aria-label','choose '+['spades','hearts','diamonds','clubs'][s]);
        sb.addEventListener('click',()=>chooseSuit(s));
        controls.appendChild(sb);
      }
    } else if(!over && turn===0 && !busy){
      const legal=CRAZYEIGHTS.legalPlays(you, top(), activeSuit);
      if(legal.length===0){
        const b=document.createElement('button'); b.type='button'; b.className='btn';
        if(canDraw()){ b.textContent='Draw a card'; b.addEventListener('click',drawYou); }
        else { b.textContent='Pass'; b.addEventListener('click',passYou); }
        controls.appendChild(b);
      }
    }
    const ng=document.createElement('button'); ng.type='button'; ng.className='btn ghost'; ng.textContent='New game';
    ng.addEventListener('click',newGame); controls.appendChild(ng);
  }

  newGame();
}

function mountDotsboxes(host, h){
  let model, mode='ai', over=false, busy=false, gen=0;
  const N = DOTSBOXES.DOTS - 1, DIM = 2*DOTSBOXES.DOTS - 1;

  function play(type, index){
    if(over||busy) return;
    if(mode==='ai' && model.turn===1) return;
    if((type==='h'?model.h:model.v)[index]) return;
    model = DOTSBOXES.claimEdge(model, type, index);
    afterMove();
  }

  function afterMove(){
    if(DOTSBOXES.isOver(model)){ over=true; busy=false; draw(); return; }
    if(mode==='ai' && model.turn===1){
      busy=true; draw();
      const myGen=gen;
      setTimeout(()=>{
        if(over || myGen!==gen || !host.isConnected) return;
        const mv=DOTSBOXES.bestMove(model);
        if(mv) model=DOTSBOXES.claimEdge(model, mv.type, mv.index);
        afterMove();
      }, 280);
    } else { busy=false; draw(); }
  }

  function newGame(){ gen++; model=DOTSBOXES.newGame(); over=false; busy=false; draw(); }

  function makeEdge(type, index, live){
    const on=(type==='h'?model.h:model.v)[index];
    const b=document.createElement('button'); b.type='button';
    b.className='edge '+type+(on?' on':' open');
    const line=document.createElement('span'); line.className='line'; b.appendChild(line);
    b.disabled = on || !live;
    b.setAttribute('aria-label',(on?'drawn ':'draw ')+(type==='h'?'horizontal':'vertical')+' edge');
    if(!on && live) b.addEventListener('click',()=>play(type,index));
    return b;
  }

  function draw(){
    const s0=model.scores[0], s1=model.scores[1];
    let status;
    if(over){
      const w=DOTSBOXES.winner(model), hi=Math.max(s0,s1), lo=Math.min(s0,s1);
      if(w==='draw') status='Every box claimed — '+s0+'–'+s1+'. A draw.';
      else if(mode==='ai') status=(w===0?'You win':'The computer wins')+' '+hi+'–'+lo+'!';
      else status='Player '+(w+1)+' wins '+hi+'–'+lo+'!';
    } else {
      const whose = mode==='ai'
        ? (model.turn===0?'Your turn':'The computer is thinking…')
        : 'Player '+(model.turn+1)+'’s turn';
      const board = mode==='ai' ? ('You '+s0+' · Computer '+s1) : ('P1 '+s0+' · P2 '+s1);
      status = whose+'  —  '+board;
    }
    h.status(status);

    host.className='dab'; host.innerHTML='';
    const grid=document.createElement('div'); grid.className='grid';
    grid.style.gridTemplateColumns='var(--d) '+'var(--e) var(--d) '.repeat(N);
    grid.style.gridTemplateRows='var(--d) '+'var(--e) var(--d) '.repeat(N);
    const live = !over && !busy && !(mode==='ai' && model.turn===1);
    for(let gr=0; gr<DIM; gr++){
      for(let gc=0; gc<DIM; gc++){
        const dotRow=gr%2===0, dotCol=gc%2===0;
        if(dotRow && dotCol){
          const d=document.createElement('span'); d.className='dot'; grid.appendChild(d);
        } else if(dotRow && !dotCol){
          grid.appendChild(makeEdge('h', (gr/2)*N + (gc-1)/2, live));
        } else if(!dotRow && dotCol){
          grid.appendChild(makeEdge('v', ((gr-1)/2)*DOTSBOXES.DOTS + gc/2, live));
        } else {
          const bi=((gr-1)/2)*N + (gc-1)/2, o=model.owner[bi];
          const cell=document.createElement('div'); cell.className='box';
          if(o===0){ cell.classList.add('p0'); cell.textContent='1'; }
          else if(o===1){ cell.classList.add('p1'); cell.textContent='2'; }
          grid.appendChild(cell);
        }
      }
    }
    host.appendChild(grid);
  }

  const controls=h.controls; controls.innerHTML='';
  function ctrl(label,fn,p){ const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=label; if(p)b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  const vsAi=ctrl('vs Computer',()=>{mode='ai';setModes();newGame();},true);
  const vs2=ctrl('2 Players',()=>{mode='2p';setModes();newGame();});
  const again=ctrl('New game',()=>newGame()); again.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  setModes(); newGame();
}
