  function mkBtn(text,fn,pressed){ const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=text; if(pressed) b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  setModes(); newGame();
}

function mountQuoridor(host, h){
  let state, mode='ai', place='move', over=false, busy=false;
  const HUMAN=0; // in vs-Computer you are pawn 0 (bottom, racing up)

  function fresh(){ state=QUORIDOR.newGame(); over=false; busy=false; place='move'; setPlace(); draw(); maybeAi(); }

  function myTurn(){ return mode==='2p' || state.turn===HUMAN; }

  function maybeAi(){
    if(over || mode!=='ai' || state.turn===HUMAN) return;
    busy=true; draw();
    setTimeout(()=>{
      if(!host.isConnected || over){ busy=false; return; }
      const act=QUORIDOR.aiMove(state);
      if(act){
        state = act.kind==='move'
          ? QUORIDOR.movePawn(state, act.r, act.c)
          : QUORIDOR.placeWall(state, act.type, act.r, act.c);
      }
      busy=false; over=QUORIDOR.winner(state)!==null; draw();
    }, 320);
  }

  function doMove(r,c){
    if(over||busy||!myTurn()) return;
    if(!QUORIDOR.pawnMoves(state).some(m=>m.r===r&&m.c===c)) return;
    state=QUORIDOR.movePawn(state,r,c);
    over=QUORIDOR.winner(state)!==null; draw();
    if(!over) maybeAi();
  }

  function doWall(type,r,c){
    if(over||busy||!myTurn()) return;
    if(!QUORIDOR.canPlaceWall(state,type,r,c)) return;
    state=QUORIDOR.placeWall(state,type,r,c);
    place='move'; setPlace();
    over=QUORIDOR.winner(state)!==null; draw();
    if(!over) maybeAi();
  }

  function draw(){
    const w=QUORIDOR.winner(state);
    let status;
    if(w!==null){
      status = mode==='ai'
        ? (w===HUMAN?'You slipped through to the far side — you win! 🎉':'The computer reached home first. New game?')
        : 'Player '+(w+1)+' wins!';
    } else if(busy){
      status='Computer is plotting…';
    } else {
      const whose = mode==='ai'
        ? (state.turn===HUMAN?'Your move':'Computer’s move')
        : 'Player '+(state.turn+1)+'’s move';
      status=whose+' · walls ◆'+state.wallsLeft[0]+' / ◇'+state.wallsLeft[1]+' · '+(place==='wall'?'tap a groove to wall':'tap a dot to step');
    }
    h.status(status);

    host.className='qd'; host.innerHTML='';
    const board=document.createElement('div'); board.className='board';
    const active = !over && !busy && myTurn();
    const wallMode = place==='wall' && active;
    const hints = (!wallMode && active) ? QUORIDOR.pawnMoves(state) : [];

    for(let r=0;r<9;r++) for(let c=0;c<9;c++){
      const isHint=hints.some(m=>m.r===r&&m.c===c);
      const tag = isHint ? 'button' : 'div';
      const cell=document.createElement(tag); cell.className='cell';
      cell.style.gridColumn=(2*c+1); cell.style.gridRow=(2*r+1);
      if(state.pawns[0].r===r&&state.pawns[0].c===c){ const p=document.createElement('span'); p.className='pawn p0'; cell.appendChild(p); }
      else if(state.pawns[1].r===r&&state.pawns[1].c===c){ const p=document.createElement('span'); p.className='pawn p1'; cell.appendChild(p); }
      if(tag==='button'){
        cell.type='button'; cell.classList.add('hint');
        cell.setAttribute('aria-label','step to row '+(r+1)+' column '+(c+1));
        cell.addEventListener('click',()=>doMove(r,c));
      }
      board.appendChild(cell);
    }

    state.walls.h.forEach(kk=>{ const a=kk.split(',').map(Number);
      const el=document.createElement('div'); el.className='wall wh';
      el.style.gridRow=(2*a[0]+2); el.style.gridColumn=(2*a[1]+1)+' / '+(2*a[1]+4); board.appendChild(el); });
    state.walls.v.forEach(kk=>{ const a=kk.split(',').map(Number);
      const el=document.createElement('div'); el.className='wall wv';
      el.style.gridColumn=(2*a[1]+2); el.style.gridRow=(2*a[0]+1)+' / '+(2*a[0]+4); board.appendChild(el); });

    if(wallMode){
      for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        if(QUORIDOR.canPlaceWall(state,'h',r,c)){
          const s=document.createElement('button'); s.type='button'; s.className='slot sh';
          s.style.gridRow=(2*r+2); s.style.gridColumn=(2*c+1);
          s.setAttribute('aria-label','horizontal wall below row '+(r+1)+' at column '+(c+1));
          s.addEventListener('click',()=>doWall('h',r,c)); board.appendChild(s);
        }
        if(QUORIDOR.canPlaceWall(state,'v',r,c)){
          const s=document.createElement('button'); s.type='button'; s.className='slot sv';
          s.style.gridColumn=(2*c+2); s.style.gridRow=(2*r+1);
          s.setAttribute('aria-label','vertical wall right of column '+(c+1)+' at row '+(r+1));
          s.addEventListener('click',()=>doWall('v',r,c)); board.appendChild(s);
        }
      }
    }
    host.appendChild(board);
  }

  const controls=h.controls; controls.innerHTML='';
  function ctrl(label,fn,pressed){ const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=label; if(pressed)b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  const vsAi=ctrl('vs Computer',()=>{mode='ai';setModes();fresh();},true);
  const vs2=ctrl('2 Players',()=>{mode='2p';setModes();fresh();});
  const again=ctrl('New game',()=>fresh()); again.classList.add('ghost');
  const moveBtn=ctrl('Move',()=>{place='move';setPlace();draw();},true);
  const wallBtn=ctrl('Wall',()=>{place='wall';setPlace();draw();});
  moveBtn.classList.add('ghost'); wallBtn.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  function setPlace(){ moveBtn.setAttribute('aria-pressed',place==='move'); wallBtn.setAttribute('aria-pressed',place==='wall'); }
  setModes(); fresh();
}

function mountStratego(host, h){
  // Stratego. Two modes: vs Computer (you are Player 1; the AI sets up and plays
  // itself, no hide screens, its pieces stay hidden until combat) and 2-player
  // pass-and-play (a "hide" interstitial between setups and turns keeps each
  // army secret). vs Computer offers three skill levels. Logic + AI: STRATEGO.
  const N = STRATEGO.SIZE; // 10
  let board, phase, setupPlayer, current, sel, legal, handoff, lastCombat;
  let mode='ai', busy=false; // 'ai' = vs Computer (default), '2p' = pass-and-play
  let difficulty='medium';   // AI skill: 'easy' | 'medium' | 'hard'

  const name = (o) => mode==='ai'
    ? (o===0 ? 'You' : 'The computer')
    : (o===0 ? 'Player 1' : 'Player 2');
  const cls = (o) => (o === 0 ? 'p0' : 'p1');

  function shuffle(a){
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }
  // Drop a fresh random army into `owner`'s four home rows (others untouched).
  function placeRandom(owner){
    const idxs=STRATEGO.setupIndices(owner);
    for(const i of idxs) board[i]=null;
    const bag=shuffle(STRATEGO.pieceBag(owner));
    idxs.forEach((i,k)=>{ board[i]=bag[k]; });
  }

  function newGame(){
    board=STRATEGO.emptyBoard();
    placeRandom(0);
    setupPlayer=0; current=0; sel=null; legal=[]; handoff=null; lastCombat=''; busy=false;
    phase='setup';
    render();
  }

  // Arrange a hide screen; `next` is applied when the receiver taps continue.
  function goHide(to, note, next){
    handoff={ to, note, next };
    phase='hide';
    render();
  }
  function proceed(){
    const next=handoff.next; handoff=null;
    next();
  }

  // ---- Setup interaction: tap two of your own pieces to swap them. ----
  function setupTap(i){
    if(phase!=='setup') return;
    const p=board[i];
    if(sel==null){
      if(p && p.owner===setupPlayer){ sel=i; render(); }
      return;
    }
    if(i===sel){ sel=null; render(); return; }
    if(p && p.owner===setupPlayer){ const t=board[i]; board[i]=board[sel]; board[sel]=t; sel=null; render(); return; }
    sel=null; render();
  }
  function ready(){
    sel=null;
    if(mode==='ai'){
      // The computer sets up its own army silently and play begins — no hide
      // screen, since there's no second human to hand the device to.
      placeRandom(1); current=0; phase='play'; render();
      return;
    }
    if(setupPlayer===0){
      goHide(1, name(0)+"'s army is set.", ()=>{
        placeRandom(1); setupPlayer=1; phase='setup'; render();
      });
    } else {
      goHide(0, 'Both armies are set. '+name(0)+' moves first.', ()=>{
        current=0; phase='play'; render();
      });
    }
  }

  function combatNote(att, def){
    if(!def) return '';
    const v=STRATEGO.resolveCombat(att.rank, def.rank);
    const a=STRATEGO.rankName(att.rank), d=STRATEGO.rankName(def.rank);
    if(def.rank==='F') return name(att.owner)+"'s "+a+' captured the flag!';
    if(v==='attacker') return name(att.owner)+"'s "+a+' beat '+name(def.owner)+"'s "+d+'.';
    if(v==='defender') return name(att.owner)+"'s "+a+' lost to '+name(def.owner)+"'s "+d+'.';
    return name(att.owner)+"'s "+a+' and '+name(def.owner)+"'s "+d+' traded off.';
  }

  // ---- Play interaction. ----
  function playTap(i){
    if(phase!=='play' || busy) return;
    if(mode==='ai' && current!==0) return; // not your turn
    const p=board[i];
    if(sel!=null && legal.includes(i)){ doMove(sel, i); return; }
    if(p && p.owner===current){
      if(i===sel){ sel=null; legal=[]; }
      else { sel=i; legal=STRATEGO.legalMoves(board, i); }
      render();
      return;
    }
    if(sel!=null){ sel=null; legal=[]; render(); }
  }
  function doMove(from, to){
    const att=board[from], def=board[to];
    board=STRATEGO.applyMove(board, from, to);
    const note=combatNote(att, def);
    sel=null; legal=[];
    const w=STRATEGO.winner(board);
    if(w!=null){ lastCombat=note; current=w; phase='over'; render(); return; }
    if(mode==='ai'){
      lastCombat=note; current=1; aiTurn();
    } else {
      const nxt = current===0?1:0;
      goHide(nxt, note, ()=>{ current=nxt; phase='play'; render(); });
    }
  }

  // The computer's turn (vs-Computer mode): think briefly, then play its move.
  function aiTurn(){
    busy=true; render();
    setTimeout(()=>{
      if(!host.isConnected) return;
      const mv=STRATEGO.aiMove(board, 1, difficulty);
      if(mv){
        const att=board[mv.from], def=board[mv.to];
        board=STRATEGO.applyMove(board, mv.from, mv.to);
        lastCombat=combatNote(att, def);
      }
      busy=false;
      const w=STRATEGO.winner(board);
      if(w!=null){ current=w; phase='over'; render(); return; }
      current=0; render();
    }, 500);
  }

  // ---- Rendering ----
  // Build a board grid seen from `viewer`'s eyes (own faces up; foes hidden
  // unless revealed). `onTap` handles clicks; `revealAll` shows every face.
  function buildBoard(viewer, onTap, revealAll){
    const grid=document.createElement('div'); grid.className='board';
    for(let i=0;i<N*N;i++){
      const r=Math.floor(i/N), c=i%N, p=board[i];
      const cell=document.createElement('button'); cell.type='button'; cell.className='sq';
      if(STRATEGO.isLake(r,c)){
        cell.classList.add('water'); cell.disabled=true;
        cell.setAttribute('aria-label','lake');
      } else if(!p){
        cell.classList.add('empty');
        if(sel!=null && legal.includes(i)) cell.classList.add('move');
        cell.disabled=!(sel!=null && legal.includes(i));
        cell.setAttribute('aria-label','empty');
      } else {
        const mine = p.owner===viewer;
        const show = revealAll || mine || p.revealed;
        if(show){
          cell.classList.add('piece', cls(p.owner));
          if(!mine && (p.revealed||revealAll)) cell.classList.add('seen');
          cell.textContent=STRATEGO.rankGlyph(p.rank);
          cell.setAttribute('aria-label', name(p.owner)+' '+STRATEGO.rankName(p.rank));
        } else {
          cell.classList.add('back', cls(p.owner));
          cell.setAttribute('aria-label', name(p.owner)+' hidden piece');
        }
        if(i===sel) cell.classList.add('sel');
        if(sel!=null && legal.includes(i)) cell.classList.add('move','attack');
        cell.disabled = !onTap;
      }
      if(onTap){ const k=i; cell.addEventListener('click',()=>onTap(k)); }
      grid.appendChild(cell);
    }
    return grid;
  }

  function legendAndControls(){
    h.controls.innerHTML='';
    if(phase==='setup'){
      const ai=ctrl('vs Computer', ()=>{ if(mode!=='ai'){ mode='ai'; newGame(); } });
      const pp=ctrl('2 Players', ()=>{ if(mode!=='2p'){ mode='2p'; newGame(); } });
      ai.setAttribute('aria-pressed', mode==='ai'?'true':'false');
      pp.setAttribute('aria-pressed', mode==='2p'?'true':'false');
      if(mode==='ai'){
        const lab=document.createElement('span'); lab.className='lvl-label'; lab.textContent='Skill:';
        h.controls.appendChild(lab);
        for(const d of ['easy','medium','hard']){
          const b=ctrl(d[0].toUpperCase()+d.slice(1), ()=>{ if(difficulty!==d){ difficulty=d; render(); } });
          b.classList.add('lvl');
          b.setAttribute('aria-pressed', difficulty===d?'true':'false');
        }
      }
      ctrl('Shuffle my setup', ()=>{ placeRandom(setupPlayer); sel=null; render(); });
      ctrl('Ready ✓', ready);
    }
    ctrl('New game', newGame, true);
    const key=document.createElement('div'); key.className='key';
    key.innerHTML='<span><b class="kx"></b>'+name(0)+'</span><span><b class="ko"></b>'+name(1)+'</span>';
    host.appendChild(key);
  }
  function ctrl(label, fn, ghost){
    const b=document.createElement('button'); b.className='btn'+(ghost?' ghost':''); b.type='button';
    b.textContent=label; b.addEventListener('click',fn); h.controls.appendChild(b); return b;
  }

  function render(){
    host.className='st'; host.innerHTML='';
    if(phase==='setup'){
      h.status(name(setupPlayer)+' — arrange your army, then press Ready. Tap two of your pieces to swap them.');
      host.appendChild(buildBoard(setupPlayer, setupTap, false));
    } else if(phase==='hide'){
      h.status('Hand the device over.');
      const card=document.createElement('div'); card.className='hide';
      const ti=document.createElement('h3'); ti.innerHTML='Pass the device to <span class="who">'+name(handoff.to)+'</span>';
      const sub=document.createElement('p'); sub.textContent='Keep the screen private until '+name(handoff.to)+' is holding it.';
      card.appendChild(ti); card.appendChild(sub);
      if(handoff.note){ const nt=document.createElement('div'); nt.className='note'; nt.textContent=handoff.note; card.appendChild(nt); }
      const go=document.createElement('button'); go.className='bigbtn'; go.type='button';
      go.textContent="I'm "+name(handoff.to)+' — continue';
      go.addEventListener('click', proceed);
      card.appendChild(go);
      host.appendChild(card);
    } else if(phase==='play'){
      const viewer = mode==='ai' ? 0 : current;
      const yourTurn = mode!=='ai' || (current===0 && !busy);
      h.status(
        (busy || (mode==='ai' && current===1))
          ? 'The computer is thinking…'
          : sel!=null
            ? name(current)+' — tap a highlighted square to move or attack, or your piece to reselect.'
            : (mode==='ai'
                ? 'Your turn — tap one of your pieces.'
                : name(current)+"'s turn — tap one of your pieces."));
      host.appendChild(buildBoard(viewer, yourTurn ? playTap : null, false));
    } else if(phase==='over'){
      h.status(name(current)+' wins!');
      const card=document.createElement('div'); card.className='over';
      card.innerHTML='<span class="crown" aria-hidden="true">🎖️</span><h3>'+name(current)+' wins!</h3>'
        +(lastCombat?'<p>'+lastCombat+'</p>':'');
      host.appendChild(card);
      host.appendChild(buildBoard(current, null, true));
    }
    legendAndControls();
  }

  newGame();
}

function mountGomoku(host, h){
  const S=GOMOKU.SIZE;
  let board, mode='ai', turn='B', over=false, busy=false, last=-1;
  function newGame(){ board=GOMOKU.emptyBoard(); turn='B'; over=false; busy=false; last=-1; draw(); }
  function play(idx){
    if(over||busy) return;
    if(mode==='ai'&&turn==='W') return;
    const nb=GOMOKU.place(board,idx,turn);
    if(!nb) return;
    board=nb; last=idx; advance();
  }
  function advance(){
    if(GOMOKU.winner(board)){ over=true; draw(); return; }
    turn = turn==='B'?'W':'B'; draw();
    if(mode==='ai'&&turn==='W'){
      busy=true;
      setTimeout(()=>{ if(over) return; const m=GOMOKU.bestMove(board,'W');
        board=GOMOKU.place(board,m,'W'); last=m; busy=false; advance(); }, 300);
    }
  }
  function draw(){
    const w=GOMOKU.winner(board);
    h.status(
      w==='draw' ? 'A draw — the board is full.' :
      w ? `${w==='B'?'Black':'White'} wins — five in a row!` :
      mode==='ai' ? (turn==='B'?'Your turn — you’re black.':'Thinking…') :
      `${turn==='B'?'Black':'White'} to play.`
    );
    host.className='gom'; host.innerHTML='';
    const grid=document.createElement('div'); grid.className='gom-board';
    for(let i=0;i<S*S;i++){
      const v=board[i], r=Math.floor(i/S), c=i%S;
      const cell=document.createElement('button'); cell.type='button'; cell.className='gom-cell';
      if(v){ const st=document.createElement('span'); st.className='gom-stone '+v; cell.appendChild(st); }
      if(i===last) cell.classList.add('last');
      cell.setAttribute('aria-label', v?`${v==='B'?'black':'white'} stone at row ${r+1}, column ${c+1}`:`place a stone at row ${r+1}, column ${c+1}`);
      cell.disabled = over||busy||v!=null||(mode==='ai'&&turn==='W');
      cell.addEventListener('click',()=>play(i));
      grid.appendChild(cell);
    }
    host.appendChild(grid);
  }
  const controls=h.controls; controls.innerHTML='';
  const vsAi=ctrl('vs Computer',()=>{mode='ai';setModes();newGame();},true);
  const vs2=ctrl('2 Players',()=>{mode='2p';setModes();newGame();});
  const again=ctrl('New game',()=>newGame()); again.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  function ctrl(label,fn,p){ const b=document.createElement('button'); b.className='btn'; b.type='button';
    b.textContent=label; if(p)b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  setModes(); newGame();
}

function mountGloble(host, h){
  const now=new Date();
  const seed=now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate();
  const answer=GLOBLE.dailyAnswer(seed);
  let guesses=[], done=false;
  function submit(raw){
    if(done) return;
    const name=String(raw||'').trim();
    if(!name){ h.status('Type a country name, then Guess.'); return; }
    const r=GLOBLE.guess(answer, name);
    if(!r){ h.status(`“${name}” isn’t a country I know — try another.`); return; }
    if(guesses.some(g=>g.country.name===r.country.name)){ h.status(`You already guessed ${r.country.name}.`); return; }
    guesses.push(r);
    if(r.correct) done=true;
    draw();
  }
  function draw(){
    host.className='globe'; host.innerHTML='';
    if(!done){
      const row=document.createElement('div'); row.className='grow';
      const inp=document.createElement('input'); inp.type='text'; inp.placeholder='Guess a country…';
      inp.setAttribute('aria-label','country guess'); inp.autocomplete='off'; inp.autocapitalize='words'; inp.spellcheck=false;
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(inp.value); });
      row.appendChild(inp); host.appendChild(row);
      inp.focus();
    }
    const list=document.createElement('div'); list.className='guesses';
    for(let i=guesses.length-1;i>=0;i--){
      const g=guesses[i];
      const item=document.createElement('div'); item.className='gitem'+(g.correct?' correct':'');
      const sw=document.createElement('span'); sw.className='gswatch';
      // proximity → hue: 100 (hot/close) = red, 0 (cold/far) = blue.
      const hue=Math.round((1-g.proximity/100)*240);
      sw.style.background=`hsl(${hue} 72% 50%)`;
      sw.setAttribute('aria-label', g.correct ? 'correct' : `warmth ${g.proximity} of 100`);
      const nm=document.createElement('span'); nm.className='gname'; nm.textContent=g.country.name;
      const km=document.createElement('span'); km.className='gkm';
      km.textContent = g.correct ? '0 km' : `${Math.round(g.km).toLocaleString()} km`;
      const ar=document.createElement('span'); ar.className='garrow'; ar.setAttribute('aria-hidden','true');
      ar.textContent = g.correct ? '🎯' : g.arrow;
      item.append(sw, nm, km, ar);
      list.appendChild(item);
    }
    host.appendChild(list);
    const note=document.createElement('p'); note.className='gnote';
    if(done){
      h.status(`Solved in ${guesses.length}! Today’s country was ${answer.name}. 🌍`);
      note.textContent='Come back tomorrow for a new country.';
    } else if(guesses.length){
      const best=guesses.reduce((a,b)=>b.proximity>a.proximity?b:a);
      h.status(`${guesses.length} guess${guesses.length===1?'':'es'} · warmest: ${best.country.name} (${best.proximity}/100).`);
      note.textContent='Redder = closer. The arrow points toward today’s country.';
    } else {
      h.status('Guess any country to begin.');
      note.textContent='Each guess shows the distance, an arrow toward the answer, and a warmer/colder colour.';
    }
    host.appendChild(note);
  }
  const controls=h.controls; controls.innerHTML='';
  const go=document.createElement('button'); go.className='btn'; go.type='button'; go.textContent='Guess';
  go.addEventListener('click',()=>{ const inp=host.querySelector('input'); if(inp) submit(inp.value); });
  controls.appendChild(go);
  draw();
}

function mountSudoku(host, h){
  let solution, givens, cells, sel=-1, diff='easy', won=false;

  const controls=h.controls; controls.innerHTML='';
  const diffWrap=document.createElement('div'); diffWrap.className='sud-diffs';
  const diffBtns={};
  [['easy','Easy'],['medium','Medium'],['hard','Hard']].forEach(([k,label])=>{
    const b=document.createElement('button'); b.type='button'; b.className='btn ghost sud-diff';
    b.textContent=label; b.setAttribute('aria-pressed', k===diff?'true':'false');
    b.addEventListener('click',()=>{ diff=k; for(const kk in diffBtns) diffBtns[kk].setAttribute('aria-pressed', kk===diff?'true':'false'); start(); });
    diffBtns[k]=b; diffWrap.appendChild(b);
  });
  const again=document.createElement('button'); again.type='button'; again.className='btn'; again.textContent='New puzzle';
  again.addEventListener('click',start);
  controls.appendChild(diffWrap); controls.appendChild(again);

  function start(){
    const g=SUDOKU.generate(Math.random, diff);
    solution=g.solution; givens=g.givens; cells=g.puzzle.slice();
    sel=-1; won=false; draw();
  }
  function select(i){ if(won||givens[i]) return; sel=(sel===i?-1:i); draw(); }
  function place(v){ if(won||sel<0||givens[sel]) return; cells[sel]=v; if(SUDOKU.isComplete(cells)) won=true; draw(); }
  function erase(){ if(won||sel<0||givens[sel]||!cells[sel]) return; cells[sel]=0; draw(); }

  function draw(){
    host.className='sud'; host.innerHTML='';
    const conf=SUDOKU.conflicts(cells);
    const filled=cells.filter(v=>v!==0).length;
    const dname=diff[0].toUpperCase()+diff.slice(1);
    if(won) h.status('Solved! Every row, column and box complete — nicely done. 🎉');
    else h.status(dname+' · '+filled+' / 81 filled · tap a cell, then a number.');

    const selVal=sel>=0?cells[sel]:0;
    const board=document.createElement('div'); board.className='sud-board';
    for(let i=0;i<81;i++){
      const cell=document.createElement('button'); cell.type='button'; cell.className='sud-cell';
      const r=Math.floor(i/9), c=i%9;
      if(c%3===0) cell.classList.add('bl');
      if(r%3===0) cell.classList.add('bt');
      if(c===8) cell.classList.add('br');
      if(r===8) cell.classList.add('bb');
      const v=cells[i];
      if(v) cell.textContent=v;
      if(givens[i]) cell.classList.add('given');
      if(selVal && v===selVal && i!==sel) cell.classList.add('peer');
      if(conf.has(i)) cell.classList.add('conflict');
      if(i===sel) cell.classList.add('sel');
      cell.setAttribute('aria-label', (givens[i]?'given ':'cell ')+(i+1)+(v?', value '+v:', empty'));
      cell.disabled=won;
      cell.addEventListener('click',()=>select(i));
      board.appendChild(cell);
    }
    host.appendChild(board);

    const pad=document.createElement('div'); pad.className='sud-pad';
    const locked=won||sel<0||givens[sel];
    for(let n=1;n<=9;n++){
      const b=document.createElement('button'); b.type='button'; b.className='sud-num';
      b.textContent=n; b.disabled=locked; b.addEventListener('click',()=>place(n));
      pad.appendChild(b);
    }
    const er=document.createElement('button'); er.type='button'; er.className='sud-num erase';
    er.textContent='⌫'; er.setAttribute('aria-label','erase'); er.disabled=locked||!selVal;
    er.addEventListener('click',erase);
    pad.appendChild(er);
    host.appendChild(pad);
  }

  start();
}

function mountKlondike(host, h){
  const K = KLONDIKE;
  let state = null;        // current game state
  let sel = null;          // selection: null | {type:'waste'} | {type:'tableau', pile, idx}
  const history = [];      // for Undo

  const controls = h.controls; controls.innerHTML = '';
  const mkBtn = (label, cls) => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = cls; b.textContent = label;
    return b;
  };
  const foundBtn = mkBtn('↑ Foundation', 'btn');
  const undoBtn = mkBtn('↶ Undo', 'btn ghost');
  const newBtn = mkBtn('New game', 'btn ghost');
  newBtn.addEventListener('click', start);
  foundBtn.addEventListener('click', () => { sendSelToFoundation(); render(); });
  undoBtn.addEventListener('click', undo);
  controls.appendChild(foundBtn); controls.appendChild(undoBtn); controls.appendChild(newBtn);

  function shuffle(deck){
    const d = deck.slice();
    for (let i = d.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const t = d[i]; d[i] = d[j]; d[j] = t;
    }
    return d;
  }
  function start(){
    state = K.deal(shuffle(K.makeDeck()));
    sel = null; history.length = 0;
    render();
  }
  function commit(next){
    if (next !== state){ history.push(state); state = next; sel = null; return true; }
    return false;
  }
  function undo(){
    if (history.length){ state = history.pop(); sel = null; render(); }
  }
  function clearSel(){ sel = null; }
  function selectTableau(p, i){ sel = { type:'tableau', pile:p, idx:i }; }
  function selectWaste(){ sel = { type:'waste' }; }

  function moveSelToPile(toPile){
    if (!sel) return false;
    let next = state;
    if (sel.type === 'waste') next = K.moveWasteToTableau(state, toPile);
    else { const count = state.tableau[sel.pile].length - sel.idx; next = K.moveTableauToTableau(state, sel.pile, count, toPile); }
    return commit(next);
  }
  function sendSelToFoundation(){
    if (!sel) return false;
    let next = state;
    if (sel.type === 'waste') next = K.moveWasteToFoundation(state);
    else { const count = state.tableau[sel.pile].length - sel.idx; if (count === 1) next = K.moveToFoundation(state, sel.pile); }
    return commit(next);
  }

  // ---- interaction ----
  function onStock(){
    const next = K.drawFromStock(state);
    if (next !== state){ history.push(state); state = next; }
    sel = null; render();
  }
  function onWaste(){
    if (!state.waste.length) return;
    if (sel && sel.type === 'waste') clearSel(); else selectWaste();
    render();
  }
  function onFoundation(){
    if (sel) sendSelToFoundation();
    render();
  }
  function onTableauCard(p, i){
    const cardObj = state.tableau[p][i];
    if (sel && (sel.type === 'waste' || sel.pile !== p)){
      const moved = moveSelToPile(p);
      if (!moved){ if (cardObj.faceUp) selectTableau(p, i); else clearSel(); }
    } else {
      if (sel && sel.type === 'tableau' && sel.pile === p && sel.idx === i) clearSel();
      else if (cardObj.faceUp) selectTableau(p, i);
      else clearSel();
    }
    render();
  }
  function onEmptyPile(p){
    if (sel) moveSelToPile(p);
    render();
  }

  // ---- rendering ----
  function cardEl(c, isSel){
    const el = document.createElement('div');
    el.className = 'kcard ' + (c.faceUp ? (K.isRed(c.suit) ? 'red' : 'black') : 'down');
    if (isSel) el.classList.add('sel');
    if (c.faceUp){
      const label = K.RANKS[c.rank - 1] + K.SUITS[c.suit];
      el.innerHTML = '<span class="kc-corner">' + label + '</span>' +
        '<span class="kc-pip">' + K.SUITS[c.suit] + '</span>';
      el.setAttribute('aria-label', K.RANKS[c.rank - 1] + ' of ' + K.SUITS[c.suit]);
    } else {
      el.setAttribute('aria-label', 'face-down card');
    }
    return el;
  }

  function render(){
    host.className = 'klon'; host.innerHTML = '';

    if (K.isWon(state)) h.status('You won — every card is home. 🎉 New game?');
    else if (sel) h.status('Now tap a pile to move there, a foundation to send up, or tap the card again to cancel.');
    else h.status('Build the four foundations A→K. Tap the stock to draw; tap a card then a destination to move.');

    // ---- top row: stock + waste (left), foundations (right) ----
    const top = document.createElement('div'); top.className = 'ktop';

    const stock = document.createElement('div');
    stock.className = 'kslot kstock' + (state.stock.length ? ' filled' : '');
    stock.setAttribute('role', 'button'); stock.tabIndex = 0;
    if (state.stock.length){
      stock.textContent = state.stock.length;
      stock.setAttribute('aria-label', 'stock, ' + state.stock.length + ' cards, tap to draw');
    } else {
      stock.textContent = '↻';
      stock.setAttribute('aria-label', state.waste.length ? 'empty stock, tap to recycle the waste' : 'empty stock');
    }
    stock.addEventListener('click', onStock);
    stock.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); onStock(); } });
    top.appendChild(stock);

    const waste = document.createElement('div'); waste.className = 'kslot kwaste';
    if (state.waste.length){
      const el = cardEl(state.waste[state.waste.length - 1], sel && sel.type === 'waste');
      el.addEventListener('click', (e) => { e.stopPropagation(); onWaste(); });
      el.addEventListener('dblclick', (e) => { e.stopPropagation(); selectWaste(); sendSelToFoundation(); render(); });
      waste.appendChild(el);
    } else { waste.setAttribute('aria-label', 'waste, empty'); }
    top.appendChild(waste);

    const founds = document.createElement('div'); founds.className = 'kfoundations';
    for (let f = 0; f < 4; f++){
      const slot = document.createElement('div'); slot.className = 'kslot kfound';
      const pile = state.foundations[f];
      if (pile.length){ slot.appendChild(cardEl(pile[pile.length - 1], false)); }
      else { slot.textContent = '♦'; slot.setAttribute('aria-label', 'empty foundation'); }
      slot.addEventListener('click', onFoundation);
      founds.appendChild(slot);
    }
    top.appendChild(founds);
    host.appendChild(top);

    // ---- tableau ----
    const tab = document.createElement('div'); tab.className = 'ktableau';
    for (let p = 0; p < 7; p++){
      const col = document.createElement('div'); col.className = 'kpile';
      const pile = state.tableau[p];
      if (!pile.length){
        const empty = document.createElement('div'); empty.className = 'kslot empty';
        empty.setAttribute('aria-label', 'empty tableau pile ' + (p + 1));
        empty.addEventListener('click', () => onEmptyPile(p));
        col.appendChild(empty);
      } else {
        for (let i = 0; i < pile.length; i++){
          const isSel = !!(sel && sel.type === 'tableau' && sel.pile === p && i >= sel.idx);
          const el = cardEl(pile[i], isSel);
          const idx = i;
          el.addEventListener('click', (e) => { e.stopPropagation(); onTableauCard(p, idx); });
          if (i === pile.length - 1 && pile[i].faceUp){
            el.addEventListener('dblclick', (e) => { e.stopPropagation(); selectTableau(p, idx); sendSelToFoundation(); render(); });
          }
          col.appendChild(el);
        }
      }
      tab.appendChild(col);
    }
    host.appendChild(tab);
  }

  start();
}

function mountChess(host, h){
  let state, mode='ai', sel=null, over=false, busy=false, gen=0, last=null, note='';
  const HUMAN='w', AI='b';
  const GLYPH={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};
  const NAMES={p:'pawn',n:'knight',b:'bishop',r:'rook',q:'queen',k:'king'};
  const cOf=(p)=>p?(p<'a'?'w':'b'):null;

  function newGame(){ gen++; state=CHESS.newGame(); sel=null; over=false; busy=false; last=null; note=''; resolve(); }
  function myTurn(){ return mode==='2p' || state.turn===HUMAN; }

  // After every board change: if the side to move has no move it is mate/stalemate;
  // otherwise, vs the computer, schedule Black's reply on a short delay (guarded by
  // a generation counter so a stale timer from a previous game is ignored).
  function resolve(){
    sel=null;
    const st=CHESS.status(state);
    over = st==='checkmate' || st==='stalemate';
    draw();
    if(over || !(mode==='ai' && state.turn===AI)) return;
    busy=true; draw();
    const myGen=gen;
    setTimeout(()=>{
      if(myGen!==gen || !host.isConnected){ busy=false; return; }
      const m=CHESS.bestMove(state,3);
      busy=false; note='';
      if(m){ last={from:m.from,to:m.to}; state=CHESS.applyMove(state,m.from,m.to,m.promo); }
      resolve();
    }, 350);
  }

  function pick(i){
    if(over||busy||!myTurn()) return;
    if(sel!=null){
      const mv=CHESS.legalMoves(state,sel).find(m=>m.to===i);
      if(mv){
        const pc=state.board[sel], tr=i>>3;
        const promo=(pc && pc.toLowerCase()==='p' && (tr===0||tr===7)) ? 'q' : undefined;
        last={from:sel,to:i};
        state=CHESS.applyMove(state,sel,i,promo);
        note = promo ? 'Pawn promoted to a queen.' : '';
        resolve();
        return;
      }
    }
    const p=state.board[i];
    if(p && cOf(p)===state.turn){ sel = sel===i ? null : i; note=''; draw(); return; }
    if(sel!=null){ sel=null; draw(); }
  }

  function statusText(){
    const st=CHESS.status(state);
    if(over){
      if(st==='checkmate'){
        const winner = state.turn==='w' ? 'Black' : 'White';
        if(mode==='ai') return winner==='White' ? 'Checkmate — you win! 🎉' : 'Checkmate — the computer wins.';
        return 'Checkmate — '+winner+' wins!';
      }
      return 'Stalemate — it’s a draw.';
    }
    if(mode==='ai' && state.turn===AI) return (note?note+' ':'')+'Computer is thinking…';
    let who = mode==='ai' ? 'Your move — you’re White.' : (state.turn==='w'?'White':'Black')+' to move.';
    if(st==='check') who = (mode==='ai' ? 'You’re in check! ' : 'Check! ') + who;
    return (note?note+' ':'')+who;
  }

  function label(i,p){
    const sq='abcdefgh'[i&7]+(8-(i>>3));
    if(!p) return sq;
    return (p<'a'?'white ':'black ')+NAMES[p.toLowerCase()]+' on '+sq;
  }

  function draw(){
    h.status(statusText());
    host.className='chess'; host.innerHTML='';
    const grid=document.createElement('div'); grid.className='board';
    const active = !over && !busy && myTurn();
    const dests = sel!=null ? CHESS.legalMoves(state,sel).map(m=>m.to) : [];
    const movable = active ? new Set(CHESS.allMoves(state).map(m=>m.from)) : new Set();
    for(let i=0;i<64;i++){
      const r=i>>3, c=i&7, light=(r+c)%2===0, p=state.board[i];
      const cell=document.createElement('button'); cell.type='button';
      cell.className='sq '+(light?'light':'dark');
      if(last && (i===last.from || i===last.to)) cell.classList.add('last');
      if(i===sel) cell.classList.add('sel');
      const isDest=dests.includes(i);
      if(isDest) cell.classList.add(p?'cap':'dest');
      if(p){ const sp=document.createElement('span'); sp.className='pc '+(p<'a'?'w':'b'); sp.textContent=GLYPH[p]; cell.appendChild(sp); }
      cell.setAttribute('aria-label', label(i,p));
      const selectable = active && movable.has(i);
      if(selectable || isDest) cell.classList.add('play');
      cell.disabled = !(active && (selectable || isDest || sel!=null));
      cell.addEventListener('click',()=>pick(i));
      grid.appendChild(cell);
    }
    host.appendChild(grid);
  }

  const controls=h.controls; controls.innerHTML='';
  function mkBtn(text,fn,pressed){ const b=document.createElement('button'); b.className='btn'; b.type='button'; b.textContent=text; if(pressed) b.setAttribute('aria-pressed','true'); b.addEventListener('click',fn); controls.appendChild(b); return b; }
  const vsAi=mkBtn('vs Computer',()=>{mode='ai';setModes();newGame();},true);
  const vs2=mkBtn('2 Players',()=>{mode='2p';setModes();newGame();});
  const again=mkBtn('New game',()=>newGame()); again.classList.add('ghost');
  function setModes(){ vsAi.setAttribute('aria-pressed',mode==='ai'); vs2.setAttribute('aria-pressed',mode==='2p'); }
  setModes(); newGame();
}

/*__MORE_MOUNTS__*/

renderCupboard();
// Deep-link straight into a game if the URL carries a hash.
if(location.hash){ const g=GAMES.find(x=>x.id===location.hash.replace('#','')); if(g) openGame(g); }

// ---- Service worker for offline play ----
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
